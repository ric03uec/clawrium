---
- hosts: all
  become: yes
  tasks:
    - name: Check if agent user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ agent_name }}"
      failed_when: false
      register: user_check

    - name: Fail if ethos not installed
      ansible.builtin.fail:
        msg: "Agent user '{{ agent_name }}' not found. Run 'clawctl agent install --type ethos ...' first."
      when: user_check.msg is defined

    - name: Verify ETHOS_GATEWAY_API_KEY is present in config
      ansible.builtin.fail:
        msg: |
          config.gateway.api_key is missing for agent '{{ agent_name }}'.
          Re-run 'clawctl agent install --type ethos --host <h> --name {{ agent_name }}' to regenerate.
      when: config.gateway is not defined or not config.gateway.api_key

    # ethos_home centralises the state-dir path so every task uses the same
    # value. ETHOS_STATE_DIR is passed to the systemd unit so ethos reads
    # its data from here regardless of the process's $HOME.
    - name: Set ethos_home fact
      ansible.builtin.set_fact:
        ethos_home: "/home/{{ agent_name }}/.ethos"

    - name: Ensure ~/.ethos config directory exists
      ansible.builtin.file:
        path: "{{ ethos_home }}"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Ensure ~/.ethos/personalities/default directory exists
      ansible.builtin.file:
        path: "{{ ethos_home }}/personalities/default"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Probe candidate ethos binary paths
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "/opt/clawrium-node24/bin/ethos"
        - "/usr/local/bin/ethos"
      register: ethos_stat_results

    - name: Fail if ethos binary not found at any candidate path
      ansible.builtin.fail:
        msg: "ethos binary not found at /opt/clawrium-node24/bin/ethos or /usr/local/bin/ethos"
      when: ethos_stat_results.results | selectattr('stat.exists', 'equalto', true) | list | length == 0

    - name: Set ethos binary path for service unit
      ansible.builtin.set_fact:
        ethos_bin_conf: "{{ (ethos_stat_results.results | selectattr('stat.exists', 'equalto', true) | first).item }}"

    - name: Sync ethos systemd unit (configure ExecStart)
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
        content: |
          [Unit]
          Description=Ethos AI Agent ({{ agent_name }})
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ agent_name }}
          WorkingDirectory={{ ethos_home }}
          EnvironmentFile={{ ethos_home }}/.env
          Environment=PATH=/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin
          Environment=ETHOS_ENV_FILE={{ ethos_home }}/.env
          Environment=ETHOS_STATE_DIR={{ ethos_home }}
          ExecStart={{ ethos_bin_conf }} run-all
          StandardOutput=journal
          StandardError=journal
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      no_log: true
      notify: Restart ethos service

    # All five config files below are deployed as pre-rendered bytes from
    # clawrium.core.render.render_ethos (#924 ATX B1, same pattern as
    # hermes #622). The canonical Python renderer owns the single source
    # of truth for the file contents; Ansible just lays the bytes down.
    # Do NOT switch these back to ansible.builtin.template — a second
    # (server-side) Jinja2 engine is exactly the dual-render-path bug
    # class #622 closed.
    - name: Deploy ~/.ethos/.env (pre-rendered canonical content)
      ansible.builtin.copy:
        content: "{{ prerendered_ethos_env }}"
        dest: "{{ ethos_home }}/.env"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart ethos service

    - name: Deploy ~/.ethos/config.yaml (pre-rendered canonical content)
      ansible.builtin.copy:
        content: "{{ prerendered_ethos_config_yaml }}"
        dest: "{{ ethos_home }}/config.yaml"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart ethos service

    - name: Deploy SOUL.md for default personality (pre-rendered)
      ansible.builtin.copy:
        content: "{{ prerendered_ethos_soul_md }}"
        dest: "{{ ethos_home }}/personalities/default/SOUL.md"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart ethos service

    - name: Deploy toolset.yaml for default personality (pre-rendered)
      ansible.builtin.copy:
        content: "{{ prerendered_ethos_toolset_yaml }}"
        dest: "{{ ethos_home }}/personalities/default/toolset.yaml"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart ethos service

    - name: Deploy personality config.yaml for default personality (pre-rendered)
      ansible.builtin.copy:
        content: "{{ prerendered_ethos_personality_config_yaml }}"
        dest: "{{ ethos_home }}/personalities/default/config.yaml"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart ethos service

    # #649: github + git integration wiring moved to the canonical sync
    # pipeline (`core/lifecycle_canonical.py:_setup_github_integration`).

    # Per-provider credential verification
    - name: Verify .env credentials for OpenRouter provider
      ansible.builtin.command:
        cmd: grep -q '^OPENROUTER_API_KEY=' "{{ ethos_home }}/.env"
      register: openrouter_check
      changed_when: false
      failed_when: openrouter_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'openrouter'
        - provider_api_key | default('') | length > 0

    - name: Verify .env credentials for Anthropic provider
      ansible.builtin.command:
        cmd: grep -q '^ANTHROPIC_API_KEY=' "{{ ethos_home }}/.env"
      register: anthropic_check
      changed_when: false
      failed_when: anthropic_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'anthropic'
        - provider_api_key | default('') | length > 0

    - name: Verify .env credentials for OpenAI provider
      ansible.builtin.command:
        cmd: grep -q '^OPENAI_API_KEY=' "{{ ethos_home }}/.env"
      register: openai_check
      changed_when: false
      failed_when: openai_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'openai'
        - provider_api_key | default('') | length > 0

    # Verify the gateway key always renders
    - name: Verify .env contains ETHOS_GATEWAY_API_KEY
      ansible.builtin.command:
        cmd: grep -q '^ETHOS_GATEWAY_API_KEY=' "{{ ethos_home }}/.env"
      register: gateway_key_check
      changed_when: false
      failed_when: gateway_key_check.rc != 0
      no_log: true

    - name: Kill stale ethos processes before restart
      ansible.builtin.shell: pkill -f "ethos run-all" || pkill -f "ethos serve" || true
      changed_when: false
      failed_when: false

    - name: Apply pending config changes
      ansible.builtin.meta: flush_handlers


    - name: Display configure success
      ansible.builtin.debug:
        msg: |
          Ethos agent '{{ agent_name }}' configured for provider '{{ config.provider.type | default('auto') }}'.
          OpenAI-compatible gateway exposed on 127.0.0.1:{{ config.gateway.port | int }}, bearer-token protected (ETHOS_GATEWAY_API_KEY).
          Service: ethos-{{ agent_name }}.service (active)

  handlers:
    # Single canonical restart handler. Always does daemon_reload.
    - name: Restart ethos service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: restarted
        enabled: yes
        daemon_reload: yes
