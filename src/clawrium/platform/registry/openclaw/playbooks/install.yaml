---
- hosts: all
  become: yes
  tasks:
    - name: Create claw user
      ansible.builtin.user:
        name: "opc-{{ inventory_hostname }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Clone OpenClaw repository
      ansible.builtin.git:
        repo: https://github.com/openclaw/openclaw.git
        dest: "/home/opc-{{ inventory_hostname }}/openclaw"
        version: "{{ claw_version | default('v2026.4.2') }}"
      become_user: "opc-{{ inventory_hostname }}"

    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: npm install
        chdir: "/home/opc-{{ inventory_hostname }}/openclaw"
      become_user: "opc-{{ inventory_hostname }}"

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/home/opc-{{ inventory_hostname }}/workspace"
        state: directory
        owner: "opc-{{ inventory_hostname }}"
        group: "opc-{{ inventory_hostname }}"
        mode: "0700"

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: "/etc/systemd/system/openclaw-opc-{{ inventory_hostname }}.service"
        content: |
          [Unit]
          Description=OpenClaw AI Assistant (opc-{{ inventory_hostname }})
          After=network.target

          [Service]
          Type=simple
          User=opc-{{ inventory_hostname }}
          WorkingDirectory=/home/opc-{{ inventory_hostname }}/openclaw
          ExecStart=/usr/bin/npm start
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start openclaw service
      ansible.builtin.systemd:
        name: "openclaw-opc-{{ inventory_hostname }}"
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
