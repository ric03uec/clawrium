---
- hosts: all
  become: yes
  tasks:
    - name: Create agent user
      ansible.builtin.user:
        name: "{{ agent_name }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Install OpenClaw CLI runtime via install-cli.sh
      ansible.builtin.shell: |
        set -euo pipefail
        curl -fsSL --proto '=https' --tlsv1.2 https://openclaw.ai/install-cli.sh | bash -s -- --prefix "/home/{{ agent_name }}/.openclaw" --install-method npm --version "{{ claw_version | default('v2026.4.2') | regex_replace('^v', '') }}" --no-onboard
      args:
        executable: /bin/bash
      become_user: "{{ agent_name }}"

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/workspace"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Create OpenClaw config directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/openclaw"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Calculate unique port (40000-42000 range)
      ansible.builtin.set_fact:
        openclaw_port: "{{ 40000 + ((agent_name | hash('md5') | int(base=16)) % 2000) }}"

    - name: Create OpenClaw environment file
      ansible.builtin.copy:
        dest: "/home/{{ agent_name }}/openclaw/.env"
        content: |
          OPENCLAW_GATEWAY_BIND=0.0.0.0
          OPENCLAW_GATEWAY_PORT={{ openclaw_port }}
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
        content: |
          [Unit]
          Description=OpenClaw AI Assistant ({{ agent_name }})
          After=network.target

          [Service]
          Type=simple
          User={{ agent_name }}
          WorkingDirectory=/home/{{ agent_name }}/workspace
          EnvironmentFile=/home/{{ agent_name }}/openclaw/.env
          ExecStart=/home/{{ agent_name }}/.openclaw/bin/openclaw gateway run --allow-unconfigured
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start openclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
