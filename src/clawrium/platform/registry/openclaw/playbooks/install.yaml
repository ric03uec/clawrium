---
- hosts: all
  become: yes
  tasks:
    - name: Normalize target OpenClaw version
      ansible.builtin.set_fact:
        openclaw_target_version: "{{ (claw_version | default('v2026.4.2')) | regex_replace('^v', '') }}"

    - name: Create agent user
      ansible.builtin.user:
        name: "{{ agent_name }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Discover openclaw binary in PATH
      ansible.builtin.command: which openclaw
      register: openclaw_which_result
      changed_when: false
      failed_when: false

    - name: Validate discovered binary path
      ansible.builtin.fail:
        msg: "Discovered openclaw binary at unsafe path: {{ openclaw_which_result.stdout }}. Expected under /usr/local/bin/, /usr/bin/, or /home/."
      when: >
        (openclaw_which_result.rc | default(1)) == 0 and
        not (openclaw_which_result.stdout.startswith('/usr/local/bin/') or
             openclaw_which_result.stdout.startswith('/usr/bin/') or
             openclaw_which_result.stdout.startswith('/home/'))

    - name: Set install skip condition
      ansible.builtin.set_fact:
        openclaw_already_installed: "{{ (openclaw_which_result.rc | default(1)) == 0 }}"
        openclaw_runtime_binary: "{{ openclaw_which_result.stdout if (openclaw_which_result.rc | default(1)) == 0 else '/home/' ~ agent_name ~ '/.openclaw/bin/openclaw' }}"

    - name: Mark install as skipped when already installed
      ansible.builtin.debug:
        msg: "OpenClaw already installed at {{ openclaw_which_result.stdout }}. Skipping binary install."
      when: openclaw_already_installed

    - name: Download OpenClaw installer script
      ansible.builtin.get_url:
        url: https://openclaw.ai/install-cli.sh
        dest: "/home/{{ agent_name }}/openclaw-install.sh"
        mode: "0700"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        force: yes
        timeout: 30
        checksum: "{{ installer_checksum | default(omit) }}"
      when: not openclaw_already_installed

    - name: Install OpenClaw CLI runtime
      ansible.builtin.command:
        argv:
          - /bin/bash
          - "/home/{{ agent_name }}/openclaw-install.sh"
          - --prefix
          - "/home/{{ agent_name }}/.openclaw"
          - --install-method
          - npm
          - --version
          - "{{ openclaw_target_version }}"
          - --no-onboard
        creates: "/home/{{ agent_name }}/.openclaw/bin/openclaw"
      become_user: "{{ agent_name }}"
      when: not openclaw_already_installed

    - name: Clean up installer script
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/openclaw-install.sh"
        state: absent
      when: not openclaw_already_installed

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/workspace"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Create OpenClaw config directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.openclaw"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Calculate unique port (40000-42000 range)
      ansible.builtin.set_fact:
        openclaw_port: "{{ 40000 + ((agent_name | hash('md5') | int(base=16)) % 2000) }}"

    - name: Write openclaw config from template
      ansible.builtin.template:
        src: "{{ template_path }}/openclaw.json.j2"
        dest: "/home/{{ agent_name }}/.openclaw/openclaw.json"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"

    - name: Write exec approvals policy from template
      ansible.builtin.template:
        src: "{{ template_path }}/exec-approvals.json.j2"
        dest: "/home/{{ agent_name }}/.openclaw/exec-approvals.json"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        backup: yes
      no_log: true

    - name: Verify exec approvals JSON is valid
      ansible.builtin.command:
        cmd: python3 -m json.tool /home/{{ agent_name }}/.openclaw/exec-approvals.json
      changed_when: false

    - name: Create environment file for agent
      ansible.builtin.copy:
        dest: "/home/{{ agent_name }}/.openclaw/env"
        content: ""
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: no

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
        content: |
          [Unit]
          Description=OpenClaw AI Assistant ({{ agent_name }})
          After=network.target

          [Service]
          Type=simple
          User={{ agent_name }}
          WorkingDirectory=/home/{{ agent_name }}/workspace
          EnvironmentFile=/home/{{ agent_name }}/.openclaw/env
          ExecStart={{ openclaw_runtime_binary }} gateway run --allow-unconfigured
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start openclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for gateway port to be listening
      ansible.builtin.wait_for:
        port: "{{ openclaw_port }}"
        host: "{{ ansible_host }}"
        timeout: 60
      delegate_to: localhost
      become: no

    - name: Read gateway authentication token from config file
      ansible.builtin.slurp:
        src: "/home/{{ agent_name }}/.openclaw/openclaw.json"
      register: openclaw_config_raw
      no_log: true

    - name: Parse gateway token from config
      ansible.builtin.set_fact:
        gateway_token_result_stdout: "{{ (openclaw_config_raw.content | b64decode | from_json).gateway.auth.token }}"
      no_log: true

    - name: Validate gateway token format
      ansible.builtin.fail:
        msg: "Gateway token not found or invalid format"
      when: >
        gateway_token_result_stdout is not defined or
        gateway_token_result_stdout | length < 32 or
        not (gateway_token_result_stdout is regex('^[a-zA-Z0-9_-]+$'))

    - name: Copy device pairing script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/pair_device.mjs"
        dest: "/home/{{ agent_name }}/pair_device.mjs"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Install ws package for pairing script
      ansible.builtin.command:
        cmd: npm install ws
        chdir: "/home/{{ agent_name }}"
      become_user: "{{ agent_name }}"
      changed_when: true

    - name: Run device pairing via localhost
      ansible.builtin.command:
        cmd: "node pair_device.mjs ws://127.0.0.1:{{ openclaw_port }} {{ gateway_token_result_stdout }}"
        chdir: "/home/{{ agent_name }}"
      become_user: "{{ agent_name }}"
      register: pairing_result
      no_log: true

    - name: Parse device credentials
      ansible.builtin.set_fact:
        device_credentials: "{{ pairing_result.stdout | from_json }}"
      no_log: true

    - name: Validate device credentials
      ansible.builtin.fail:
        msg: "Device pairing failed: {{ device_credentials.error | default('unknown error') }}"
      when: device_credentials.deviceToken is not defined or device_credentials.deviceToken | length < 10

    - name: Clean up pairing script
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/pair_device.mjs"
        state: absent

    - name: Clean up node_modules from pairing
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/node_modules"
        state: absent

    - name: Save all credentials to fact for retrieval
      ansible.builtin.set_fact:
        openclaw_gateway_token: "{{ gateway_token_result_stdout }}"
        openclaw_gateway_url: "ws://{{ ansible_host }}:{{ openclaw_port }}"
        openclaw_device_id: "{{ device_credentials.deviceId }}"
        openclaw_device_token: "{{ device_credentials.deviceToken }}"
        openclaw_device_private_key: "{{ device_credentials.privateKeyPem }}"
        cacheable: true
      no_log: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
