---
- hosts: all
  become: yes
  tasks:
    - name: Create claw user
      ansible.builtin.user:
        name: "{{ claw_user }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Clone OpenClaw repository
      ansible.builtin.git:
        repo: https://github.com/openclaw/openclaw.git
        dest: "/home/{{ claw_user }}/openclaw"
        version: "{{ claw_version | default('v2026.4.2') }}"
      become_user: "{{ claw_user }}"

    - name: Install npm dependencies
      ansible.builtin.command:
        cmd: npm install
        chdir: "/home/{{ claw_user }}/openclaw"
      become_user: "{{ claw_user }}"

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/home/{{ claw_user }}/workspace"
        state: directory
        owner: "{{ claw_user }}"
        group: "{{ claw_user }}"
        mode: "0700"

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: "/etc/systemd/system/openclaw-{{ claw_user }}.service"
        content: |
          [Unit]
          Description=OpenClaw AI Assistant ({{ claw_user }})
          After=network.target

          [Service]
          Type=simple
          User={{ claw_user }}
          WorkingDirectory=/home/{{ claw_user }}/openclaw
          ExecStart=/usr/bin/npm start
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start openclaw service
      ansible.builtin.systemd:
        name: "openclaw-{{ claw_user }}"
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
