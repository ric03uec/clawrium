---
- hosts: all
  become: yes
  tasks:
    # W3 (ATX iter-4): a direct `ansible-playbook install.yaml` run
    # (no `operator_platform` extravar) would otherwise pass these
    # tasks and crash deep in the pair step with an opaque
    # `AnsibleUndefinedVariable`. Fail early with a hint pointing at
    # `clawctl agent create`, which is the only supported entry.
    - name: Assert operator_platform is provided (set by core/install.py)
      ansible.builtin.assert:
        that:
          - operator_platform is defined
          - operator_platform | length > 0
        fail_msg: >-
          `operator_platform` extravar is required; the openclaw
          pair script records it on the daemon's device entry. This
          playbook is invoked by `clawctl agent create`
          (core/install.py), which sets it from the operator
          machine's `sys.platform`. A direct `ansible-playbook
          install.yaml` invocation is not supported.

    - name: Normalize target OpenClaw version
      ansible.builtin.set_fact:
        openclaw_target_version: "{{ (claw_version | default('v2026.6.8')) | regex_replace('^v', '') }}"

    - name: Create agent user
      ansible.builtin.user:
        name: "{{ agent_name }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Check per-agent openclaw binary
      ansible.builtin.stat:
        path: "/home/{{ agent_name }}/.openclaw/bin/openclaw"
      register: openclaw_per_agent_stat

    - name: Discover openclaw binary in PATH
      ansible.builtin.command: which openclaw
      register: openclaw_which_result
      changed_when: false
      failed_when: false

    # W2: a zero-byte or non-executable per-agent file (e.g. crashed mid-flight
    # install artifact) must NOT be accepted as a working binary — that would
    # silently produce an ExecStart that crash-loops under systemd's Restart=always.
    - name: Resolve openclaw binary (per-agent preferred, PATH fallback)
      ansible.builtin.set_fact:
        openclaw_discovered_binary: >-
          {{ ('/home/' ~ agent_name ~ '/.openclaw/bin/openclaw')
             if (openclaw_per_agent_stat.stat.exists
                 and openclaw_per_agent_stat.stat.executable | default(false)
                 and (openclaw_per_agent_stat.stat.size | default(0)) > 0)
             else (openclaw_which_result.stdout
                   if (openclaw_which_result.rc | default(1)) == 0
                   else '') }}

    # The validator runs unconditionally on the RESOLVED binary — not on the
    # raw `which` result and not gated on stat existence. Round 2 ATX flagged
    # that gating on `not openclaw_per_agent_stat.stat.exists` creates a
    # security gap: a zero-byte or non-executable per-agent file is rejected
    # by W2's executable+size check, falls through to the PATH binary, but
    # would then bypass this validator. Validating the resolved variable
    # closes that path. The per-agent /home/... case trivially passes the
    # allowlist — that's correct, not a no-op.
    - name: Validate discovered binary path
      ansible.builtin.fail:
        msg: "Discovered openclaw binary at unsafe path: {{ openclaw_discovered_binary }}. Expected under /usr/local/bin/, /usr/bin/, or /home/."
      when: >
        (openclaw_discovered_binary | length) > 0 and
        not (openclaw_discovered_binary.startswith('/usr/local/bin/') or
             openclaw_discovered_binary.startswith('/usr/bin/') or
             openclaw_discovered_binary.startswith('/home/'))

    - name: Get installed openclaw version
      ansible.builtin.command: "{{ openclaw_discovered_binary }} --version"
      register: openclaw_version_check
      changed_when: false
      failed_when: false
      when: (openclaw_discovered_binary | length) > 0

    # Defensive parse: empty string on no-match means a version check failure
    # is treated as "version unknown" -> not a match -> reinstall (safe default).
    - name: Parse installed openclaw version
      ansible.builtin.set_fact:
        openclaw_installed_version: "{{ (openclaw_version_check.stdout | default('')) | regex_search('([0-9]+\\.[0-9]+\\.[0-9]+)') | default('', true) }}"
      when:
        - openclaw_version_check is defined
        - (openclaw_version_check.rc | default(1)) == 0

    - name: Set install skip condition
      ansible.builtin.set_fact:
        openclaw_already_installed: >-
          {{ (openclaw_discovered_binary | length) > 0
             and (openclaw_installed_version | default('')) == openclaw_target_version
             and not (force_install | default(false) | bool) }}
        openclaw_runtime_binary: "{{ openclaw_discovered_binary if (openclaw_discovered_binary | length) > 0 else '/home/' ~ agent_name ~ '/.openclaw/bin/openclaw' }}"

    - name: Mark install as skipped when already installed
      ansible.builtin.debug:
        msg: "OpenClaw v{{ openclaw_installed_version | default('unknown') }} already installed at {{ openclaw_discovered_binary }}. Skipping binary install."
      when: openclaw_already_installed

    - name: Note that --force was supplied (overriding skip)
      ansible.builtin.debug:
        msg: "force=true: reinstalling OpenClaw at {{ openclaw_discovered_binary | default('<no prior install>') }}"
      when:
        - (openclaw_discovered_binary | length) > 0
        - force_install | default(false) | bool

    - name: Download OpenClaw installer script
      ansible.builtin.get_url:
        url: https://openclaw.ai/install-cli.sh
        dest: "/home/{{ agent_name }}/openclaw-install.sh"
        mode: "0700"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        force: yes
        timeout: 30
        # Variable name must match `claw_sha256` injected by
        # `core/install.py` (issue #592 ATX B1). Older revisions used
        # `installer_checksum` which never resolved, silently dropping
        # the checksum gate via `default(omit)`. Manifest entries that
        # omit the `sha256:` field still bypass verification — adding
        # it per platform entry is tracked as a separate hardening
        # follow-up because the openclaw installer URL is unpinned and
        # the digest rotates upstream without a manifest bump.
        checksum: "{{ ('sha256:' + claw_sha256) if claw_sha256 else omit }}"
      when: not openclaw_already_installed

    - name: Install OpenClaw CLI runtime
      ansible.builtin.command:
        argv:
          - /bin/bash
          - "/home/{{ agent_name }}/openclaw-install.sh"
          - --prefix
          - "/home/{{ agent_name }}/.openclaw"
          - --install-method
          - npm
          - --version
          - "{{ openclaw_target_version }}"
          - --no-onboard
      become_user: "{{ agent_name }}"
      when: not openclaw_already_installed

    - name: Clean up installer script
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/openclaw-install.sh"
        state: absent
      when: not openclaw_already_installed

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/workspace"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Create OpenClaw config directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.openclaw"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Resolve per-instance gateway port from inventory (issue #533)
      ansible.builtin.set_fact:
        openclaw_port: "{{ config.gateway.port }}"

    # Skip on already-installed path: rewriting openclaw.json would rotate the
    # gateway token in the running daemon and invalidate the credentials cached
    # in hosts.json. The existing config on disk is preserved verbatim.
    - name: Write openclaw config (pre-rendered)
      ansible.builtin.copy:
        content: "{{ prerendered_openclaw_config_json }}"
        dest: "/home/{{ agent_name }}/.openclaw/openclaw.json"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      when: not openclaw_already_installed
      # ATX iter-1 B1: openclaw.json embeds the gateway bearer token.
      # Every other secret-touching task in this playbook already carries
      # `no_log: true`; this copy write must too so `-v` ansible-runner
      # logs don't leak the rendered file path / contents into the artifact
      # directory.
      no_log: true

    - name: Write exec approvals policy from template
      ansible.builtin.template:
        src: "{{ template_path }}/exec-approvals.json.j2"
        dest: "/home/{{ agent_name }}/.openclaw/exec-approvals.json"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        # W6 (ATX iter-2): `backup: yes` accumulates
        # `exec-approvals.json.NNNN~` siblings on every install/reconfigure
        # with no rotation; the previous value is recoverable from the
        # template anyway.
      no_log: true

    - name: Verify exec approvals JSON is valid
      ansible.builtin.command:
        cmd: python3 -m json.tool /home/{{ agent_name }}/.openclaw/exec-approvals.json
      changed_when: false

    - name: Create environment file for agent
      ansible.builtin.copy:
        dest: "/home/{{ agent_name }}/.openclaw/env"
        content: ""
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: no

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
        content: |
          [Unit]
          Description=OpenClaw AI Assistant ({{ agent_name }})
          After=network.target

          [Service]
          Type=simple
          User={{ agent_name }}
          WorkingDirectory=/home/{{ agent_name }}/workspace
          EnvironmentFile=/home/{{ agent_name }}/.openclaw/env
          ExecStart={{ openclaw_runtime_binary }} gateway run --allow-unconfigured
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      register: openclaw_unit_file_result

    # B3: when the unit file's ExecStart changes (e.g., binary path shifts from
    # /usr/local/bin/openclaw to /home/<agent>/.openclaw/bin/openclaw), the next
    # `state: started` is a no-op on already-active services. Force a restart so
    # the daemon picks up the new binary without waiting for a reboot.
    - name: Restart openclaw service on ExecStart change
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: restarted
        enabled: yes
        daemon_reload: yes
      when: openclaw_unit_file_result.changed

    - name: Enable and start openclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for gateway port to be listening
      ansible.builtin.wait_for:
        port: "{{ openclaw_port }}"
        host: "{{ ansible_host }}"
        timeout: 60
      delegate_to: localhost
      become: no

    # The pairing block below is gated on `not openclaw_already_installed` so
    # we don't re-pair (and rotate device credentials) on every re-install.
    # `npm install ws` alone is the dominant cost; pairing also generates new
    # device credentials that would invalidate any cached client tokens.
    - name: Read gateway authentication token from config file
      ansible.builtin.slurp:
        src: "/home/{{ agent_name }}/.openclaw/openclaw.json"
      register: openclaw_config_raw
      no_log: true
      when: not openclaw_already_installed

    - name: Parse gateway token from config
      ansible.builtin.set_fact:
        gateway_token_result_stdout: "{{ (openclaw_config_raw.content | b64decode | from_json).gateway.auth.token }}"
      no_log: true
      when: not openclaw_already_installed

    - name: Validate gateway token format
      ansible.builtin.fail:
        msg: "Gateway token not found or invalid format"
      when:
        - not openclaw_already_installed
        - gateway_token_result_stdout is not defined or
          gateway_token_result_stdout | length < 32 or
          not (gateway_token_result_stdout is regex('^[a-zA-Z0-9_-]+$'))
      # ATX iter-2 B1: every adjacent task touching gateway_token_result_stdout
      # carries no_log: true. At -v / -vvv, ansible-runner writes the
      # evaluated when-condition into the artifacts directory before
      # _cleanup_ansible_artifacts runs.
      no_log: true

    - name: Copy device pairing script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/pair_device.mjs"
        dest: "/home/{{ agent_name }}/pair_device.mjs"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"
      when: not openclaw_already_installed

    - name: Install ws package for pairing script
      ansible.builtin.command:
        cmd: npm install ws
        chdir: "/home/{{ agent_name }}"
      become_user: "{{ agent_name }}"
      changed_when: true
      when: not openclaw_already_installed

    - name: Run device pairing via localhost
      # Pass the OPERATOR's platform (the clawctl machine that drove
      # this install) as the 3rd arg so the daemon's paired record
      # carries the same `platform` value the chat client will send
      # on subsequent connects. Without this the daemon flags
      # later connects as "device identity changed" and demands UI
      # re-approval.
      ansible.builtin.command:
        argv:
          - node
          - pair_device.mjs
          - "ws://127.0.0.1:{{ openclaw_port }}"
          - "{{ gateway_token_result_stdout }}"
          - "{{ operator_platform }}"
        chdir: "/home/{{ agent_name }}"
      become_user: "{{ agent_name }}"
      register: pairing_result
      no_log: true
      when: not openclaw_already_installed

    - name: Parse device credentials
      ansible.builtin.set_fact:
        device_credentials: "{{ pairing_result.stdout | from_json }}"
      no_log: true
      when: not openclaw_already_installed

    - name: Validate device credentials
      ansible.builtin.fail:
        msg: "Device pairing failed: {{ device_credentials.error | default('unknown error') }}"
      when:
        - not openclaw_already_installed
        - device_credentials.deviceToken is not defined or device_credentials.deviceToken | length < 10
      # ATX iter-1 W5: consistency with surrounding `no_log: true` tasks.
      # `when` clause evaluation may surface the token length in verbose logs.
      no_log: true

    - name: Clean up pairing script
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/pair_device.mjs"
        state: absent

    - name: Clean up node_modules from pairing
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/node_modules"
        state: absent

    - name: Save all credentials to fact for retrieval
      ansible.builtin.set_fact:
        openclaw_gateway_token: "{{ gateway_token_result_stdout }}"
        # ATX iter-1 W4: scheme is hardcoded `ws://`. Operators fronting the
        # gateway with TLS need `wss://` here; today they get a confusing
        # connection error from `clawctl chat <openclaw>`. Tracked as a known
        # limitation; safe to address in a follow-up since openclaw deploys
        # are LAN-only today (no TLS termination in the documented topology).
        openclaw_gateway_url: "ws://{{ ansible_host }}:{{ openclaw_port }}"
        openclaw_device_id: "{{ device_credentials.deviceId }}"
        openclaw_device_token: "{{ device_credentials.deviceToken }}"
        openclaw_device_private_key: "{{ device_credentials.privateKeyPem }}"
        cacheable: true
      no_log: true
      when: not openclaw_already_installed
