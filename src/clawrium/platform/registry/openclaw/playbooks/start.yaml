---
- hosts: all
  become: yes
  tasks:
    - name: Get agent user home directory
      ansible.builtin.getent:
        database: passwd
        key: "{{ agent_name }}"
      register: user_info
      failed_when: false

    - name: Check if systemd service exists
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
      register: service_file

    - name: Fail if service not installed
      ansible.builtin.fail:
        msg: "OpenClaw service not installed. Run 'clm agent install' first."
      when: not service_file.stat.exists

    - name: Start openclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: started
        enabled: yes
        daemon_reload: yes
      register: start_result

    - name: Wait for service to be active
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
      register: service_status
      until: service_status.status.ActiveState == "active"
      retries: 10
      delay: 3

    - name: Verify process is running
      ansible.builtin.command:
        cmd: pgrep -u {{ agent_name }} node
      register: process_check
      changed_when: false
      failed_when: process_check.rc != 0

    - name: Get process info
      ansible.builtin.command:
        cmd: pgrep -u {{ agent_name }} node
      register: pid_result
      changed_when: false

    - name: Display success message
      ansible.builtin.debug:
        msg: "OpenClaw started successfully (PID: {{ pid_result.stdout_lines[0] }})"
