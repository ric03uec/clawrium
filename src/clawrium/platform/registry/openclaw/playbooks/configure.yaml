---
- hosts: all
  become: yes
  tasks:
    - name: Verify gateway token exists in config (strict mode only)
      ansible.builtin.fail:
        msg: "Gateway auth token not found. Run installation again to generate token."
      when:
        - config.gateway.auth is not defined or not config.gateway.auth
      tags: [never, strict]

    - name: Check if agent user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ agent_name }}"
      failed_when: false
      register: user_check

    - name: Fail if claw not installed
      ansible.builtin.fail:
        msg: "Agent user '{{ agent_name }}' not found. Run 'clawctl agent install' first."
      when: user_check.msg is defined

    - name: Ensure openclaw config directory exists
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.openclaw"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    # Workspace setup for identity files
    - name: Ensure workspace directory exists
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.openclaw/workspace"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Copy SOUL.md to workspace
      ansible.builtin.copy:
        src: "{{ identity_files.soul_path }}"
        dest: "/home/{{ agent_name }}/.openclaw/workspace/SOUL.md"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0644"
      when: identity_files is defined and identity_files.soul_path is defined

    - name: Render AGENTS.md from template
      ansible.builtin.template:
        src: "{{ template_path }}/AGENTS.md.j2"
        dest: "/home/{{ agent_name }}/.openclaw/workspace/AGENTS.md"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0644"
      when: identity_files is defined and identity_files.sync_workspace | default(false)

    - name: Render TOOLS.md from template
      ansible.builtin.template:
        src: "{{ template_path }}/TOOLS.md.j2"
        dest: "/home/{{ agent_name }}/.openclaw/workspace/TOOLS.md"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0644"
      when: identity_files is defined and identity_files.sync_workspace | default(false)

    - name: Render IDENTITY.md from template
      ansible.builtin.template:
        src: "{{ template_path }}/IDENTITY.md.j2"
        dest: "/home/{{ agent_name }}/.openclaw/workspace/IDENTITY.md"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0644"
      when: identity_files is defined and identity_files.sync_workspace | default(false)

    # #755: openclaw plugin install lifted into the canonical sync
    # pipeline (`core/lifecycle_canonical.py:_openclaw_install_plugins`).
    # Configure stays scoped to onboarding stages (providers / identity
    # / channels); plugin install fires on every `clawctl agent sync`,
    # which is the operator's "flush declared state" entry point.

    - name: Write openclaw .env from template
      ansible.builtin.template:
        src: "{{ template_path }}/.env.j2"
        dest: "/home/{{ agent_name }}/.openclaw/env"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      no_log: true
      notify: Restart openclaw service

    # Render ~/.gitconfig for each `git` integration (#531). Position
    # mirrors zeroclaw: before the GitHub auth block. selectattr filter
    # returns an empty list when no `git` integration is assigned, making
    # this a no-op on existing fleets.
    - name: Render ~/.gitconfig for each git integration
      ansible.builtin.template:
        src: "{{ shared_template_path }}/gitconfig.j2"
        dest: "/home/{{ agent_name }}/.gitconfig"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      become: yes
      become_user: "{{ agent_name }}"
      no_log: true
      when: integrations is defined
      loop: "{{ integrations | dict2items | selectattr('value.type', 'equalto', 'git') | list }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        git:
          user_name:            "{{ item.value.GIT_USER_NAME | default('') }}"
          user_email:           "{{ item.value.GIT_USER_EMAIL | default('') }}"
          init_default_branch:  "{{ item.value.GIT_INIT_DEFAULT_BRANCH | default('main') }}"
          pull_rebase:          "{{ item.value.GIT_PULL_REBASE | default('false') }}"
          core_editor:          "{{ item.value.GIT_CORE_EDITOR | default('vim') }}"

    # GitHub CLI authentication block
    # Authenticates gh CLI for each github integration if gh is installed
    # This enables openclaw's bundled github skill automatically
    - name: GitHub CLI authentication block
      when: integrations is defined
      block:
        - name: Check if gh CLI is installed
          ansible.builtin.command: which gh
          register: gh_check
          changed_when: false
          failed_when: false

        - name: Authenticate gh CLI for each github integration
          ansible.builtin.command:
            argv:
              - "{{ gh_check.stdout }}"
              - auth
              - login
              - --with-token
            stdin: "{{ item.value.GITHUB_TOKEN }}"
          become: yes
          become_user: "{{ agent_name }}"
          no_log: true
          when:
            - gh_check.rc == 0
            - item.value.type == 'github'
            - item.value.GITHUB_TOKEN is defined
          loop: "{{ integrations | dict2items }}"
          loop_control:
            label: "{{ item.key }}"

    - name: Write openclaw config (pre-rendered)
      ansible.builtin.copy:
        content: "{{ prerendered_openclaw_config_json }}"
        dest: "/home/{{ agent_name }}/.openclaw/openclaw.json"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      no_log: true
      notify: Restart openclaw service

    # #835: slack MCP binary install lives in a dedicated sync-time
    # runbook (`install_slack_mcp.yaml` + `_macos` sibling) invoked
    # from `core.lifecycle_canonical._openclaw_install_slack_mcp`.
    # See AGENTS.md §"Integration Binary Install" — configure.yaml
    # is not the entry point the modern kubectl-style CLI takes.

    - name: Write exec approvals policy from template
      ansible.builtin.template:
        src: "{{ template_path }}/exec-approvals.json.j2"
        dest: "/home/{{ agent_name }}/.openclaw/exec-approvals.json"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        # W6: `backup: yes` accumulates `exec-approvals.json.NNNN~`
        # siblings on every reconfigure with no rotation; on
        # hot-iterating agents this grows unbounded. The previous
        # value is recoverable via git (template-rendered) anyway.
      no_log: true
      notify: Restart openclaw service

    - name: Verify exec approvals JSON is valid
      ansible.builtin.command:
        cmd: python3 -m json.tool /home/{{ agent_name }}/.openclaw/exec-approvals.json
      changed_when: false

    # B1/B2/B3 fix: Wrap verification in block/always for cleanup; use command not script
    - name: Config verification block
      when: config.provider is defined and config.provider.default_model is defined
      block:
        - name: Write expected config for verification
          no_log: true
          ansible.builtin.copy:
            content: "{{ config | to_json }}"
            dest: "/tmp/clawrium_expected_config_{{ agent_name }}.json"
            mode: "0600"

        - name: Copy verify script to remote
          ansible.builtin.copy:
            src: "{{ template_path }}/verify_config.py"
            dest: "/tmp/clawrium_verify_config_{{ agent_name }}.py"
            mode: "0700"

        - name: Verify openclaw.json configuration
          no_log: true
          ansible.builtin.command:
            argv:
              - python3
              - "/tmp/clawrium_verify_config_{{ agent_name }}.py"
              - "/home/{{ agent_name }}/.openclaw/openclaw.json"
              - "/tmp/clawrium_expected_config_{{ agent_name }}.json"
          register: verify_config
          failed_when: verify_config.rc != 0

      always:
        - name: Clean up expected config temp file
          ansible.builtin.file:
            path: "/tmp/clawrium_expected_config_{{ agent_name }}.json"
            state: absent

        - name: Clean up verify script
          ansible.builtin.file:
            path: "/tmp/clawrium_verify_config_{{ agent_name }}.py"
            state: absent

    # Verify .env has the required credential key for the configured
    # provider type. #583: previously implemented via `lineinfile` with
    # `check_mode: true` + `failed_when: <reg>.changed` — that's broken
    # because lineinfile with `state: present` + `regexp` + `line` will
    # always report `changed=true` in check mode against any real value
    # (it would REPLACE the matching line with the literal placeholder).
    # The verify task therefore failed every time the API key was
    # actually set, regardless of file content. Replace with a real
    # presence probe via `command: grep -qE ...` so the verification
    # checks what its name says it checks.
    - name: Verify .env has the configured provider's credential key
      ansible.builtin.command:
        # `grep -qE '^KEY=.+'` — line exists AND has a non-empty value
        # after the `=`. `argv` form avoids any shell interpretation.
        argv:
          - grep
          - -qE
          - "^{{ provider_env_key }}=.+"
          - "/home/{{ agent_name }}/.openclaw/env"
      register: provider_env_check
      changed_when: false
      failed_when: provider_env_check.rc != 0
      no_log: true
      vars:
        provider_env_key: >-
          {{
            {'anthropic': 'ANTHROPIC_API_KEY',
             'openai': 'OPENAI_API_KEY',
             'openrouter': 'OPENROUTER_API_KEY',
             'zai': 'ZAI_API_KEY',
             'vertex': 'GOOGLE_APPLICATION_CREDENTIALS'}[config.provider.type]
          }}
      when:
        - config.provider is defined
        - config.provider.type in ['anthropic','openai','openrouter','zai','vertex']
        - provider_api_key | default('') | length > 0

    # Bedrock is the one type that needs TWO keys (access + secret).
    # Same grep contract, two probes.
    - name: Verify .env has AWS_ACCESS_KEY_ID (Bedrock provider)
      ansible.builtin.command:
        argv:
          - grep
          - -qE
          - "^AWS_ACCESS_KEY_ID=.+"
          - "/home/{{ agent_name }}/.openclaw/env"
      register: bedrock_access_check
      changed_when: false
      failed_when: bedrock_access_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'bedrock'
        - aws_access_key | default('') | length > 0
        - aws_secret_key | default('') | length > 0

    - name: Verify .env has AWS_SECRET_ACCESS_KEY (Bedrock provider)
      ansible.builtin.command:
        argv:
          - grep
          - -qE
          - "^AWS_SECRET_ACCESS_KEY=.+"
          - "/home/{{ agent_name }}/.openclaw/env"
      register: bedrock_secret_check
      changed_when: false
      failed_when: bedrock_secret_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'bedrock'
        - aws_access_key | default('') | length > 0
        - aws_secret_key | default('') | length > 0

    - name: Ensure service is enabled
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        enabled: yes
        daemon_reload: yes

  handlers:
    - name: Restart openclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: restarted
        daemon_reload: yes
      ignore_errors: yes
