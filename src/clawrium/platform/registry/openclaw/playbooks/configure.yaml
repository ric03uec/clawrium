---
- hosts: all
  become: yes
  tasks:
    - name: Check if agent user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ agent_name }}"
      failed_when: false
      register: user_check

    - name: Fail if claw not installed
      ansible.builtin.fail:
        msg: "Agent user '{{ agent_name }}' not found. Run 'clm agent install' first."
      when: user_check.msg is defined

    - name: Ensure openclaw directory exists
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/openclaw"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Write openclaw .env from template
      ansible.builtin.template:
        src: "{{ template_path }}/.env.j2"
        dest: "/home/{{ agent_name }}/openclaw/.env"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      notify: Restart openclaw service

    - name: Ensure service is enabled
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        enabled: yes
        daemon_reload: yes

  handlers:
    - name: Restart openclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: restarted
        daemon_reload: yes
      ignore_errors: yes
