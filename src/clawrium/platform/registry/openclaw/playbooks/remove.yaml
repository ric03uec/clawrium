---
- hosts: all
  become: yes
  become_method: sudo
  tasks:
    - name: Check if systemd service exists
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
      register: service_file

    - name: Stop openclaw service if running
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: stopped
      when: service_file.stat.exists
      ignore_errors: yes

    - name: Disable openclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        enabled: no
      when: service_file.stat.exists
      ignore_errors: yes

    - name: Remove systemd service file
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
        state: absent
      notify: Reload systemd

    - name: Check if openclaw installation exists
      ansible.builtin.stat:
        path: "/home/{{ agent_name }}/openclaw"
      register: install_dir

    - name: Remove openclaw installation directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/openclaw"
        state: absent
      when: install_dir.stat.exists

    - name: Check if openclaw runtime prefix exists
      ansible.builtin.stat:
        path: "/home/{{ agent_name }}/.openclaw"
      register: runtime_prefix_dir

    - name: Remove openclaw runtime prefix
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.openclaw"
        state: absent
      when: runtime_prefix_dir.stat.exists

    - name: Check if workspace directory exists
      ansible.builtin.stat:
        path: "/home/{{ agent_name }}/workspace"
      register: workspace_dir

    - name: Remove workspace directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/workspace"
        state: absent
      when: workspace_dir.stat.exists

    - name: Check if agent user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ agent_name }}"
      register: user_check
      ignore_errors: yes

    - name: Remove agent user account
      ansible.builtin.user:
        name: "{{ agent_name }}"
        state: absent
        remove: yes
      when: user_check is not failed

    - name: Display success message
      ansible.builtin.debug:
        msg: "OpenClaw removed successfully"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
