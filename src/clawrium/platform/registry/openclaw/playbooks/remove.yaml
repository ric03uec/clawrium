---
- hosts: all
  become: yes
  become_method: sudo
  tasks:
    - name: Check if systemd service exists
      ansible.builtin.stat:
        path: "/etc/systemd/system/openclaw-{{ claw_user }}.service"
      register: service_file

    - name: Stop openclaw service if running
      ansible.builtin.systemd:
        name: "openclaw-{{ claw_user }}"
        state: stopped
      when: service_file.stat.exists
      ignore_errors: yes

    - name: Disable openclaw service
      ansible.builtin.systemd:
        name: "openclaw-{{ claw_user }}"
        enabled: no
      when: service_file.stat.exists
      ignore_errors: yes

    - name: Remove systemd service file
      ansible.builtin.file:
        path: "/etc/systemd/system/openclaw-{{ claw_user }}.service"
        state: absent
      notify: Reload systemd

    - name: Check if openclaw installation exists
      ansible.builtin.stat:
        path: "/home/{{ claw_user }}/openclaw"
      register: install_dir

    - name: Remove openclaw installation directory
      ansible.builtin.file:
        path: "/home/{{ claw_user }}/openclaw"
        state: absent
      when: install_dir.stat.exists

    - name: Check if workspace directory exists
      ansible.builtin.stat:
        path: "/home/{{ claw_user }}/workspace"
      register: workspace_dir

    - name: Remove workspace directory
      ansible.builtin.file:
        path: "/home/{{ claw_user }}/workspace"
        state: absent
      when: workspace_dir.stat.exists

    - name: Check if claw user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ claw_user }}"
      register: user_check
      ignore_errors: yes

    - name: Remove claw user account
      ansible.builtin.user:
        name: "{{ claw_user }}"
        state: absent
        remove: yes
      when: user_check is succeeded

    - name: Display success message
      ansible.builtin.debug:
        msg: "OpenClaw removed successfully"

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
