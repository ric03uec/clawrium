name: zeroclaw
description: "Lightweight AI assistant for edge devices and Raspberry Pi"
entries:
  # Raspberry Pi 2/3 (armv7l) - Debian 13 (trixie)
  - version: "0.5.7"
    os: debian
    os_version: "13"
    arch: armv7l
    sha256: "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
    requirements:
      min_memory_mb: 512  # Pi 2 has ~920MB usable (1GB - video mem)
      gpu_required: false
      dependencies:
        python: ">=3.9"
  # Raspberry Pi 4/5 (aarch64) - Ubuntu
  - version: "0.5.7"
