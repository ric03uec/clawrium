agent:
  type: zeroclaw
  description: "Lightweight AI assistant for edge devices and Raspberry Pi"

# Workspace metadata consumed by cross-claw subsystems (memory CLI, etc.).
# Path α (chosen for #358): the workspace dir holds the 7 personality MD
# files surfaced as "memory" through `clm agent memory show|edit|delete`.
# See .itx/358/01_EXECUTION.md for the (α vs β) rationale.
workspace:
  memory_path: "~/.zeroclaw/workspace"

# Capability flags advertised by this manifest.
features:
  # Memory CLI dispatches to zeroclaw/playbooks/memory_*.yaml against the
  # workspace path above.
  memory: true
  # Chat dispatch routes to `core/chat_zeroclaw.py` (WebSocket client speaking
  # ZeroClaw's tagged-JSON envelope). Distinct from openclaw's `websocket`
  # value because the frame schemas differ (different `type` values, different
  # auth header, different stream semantics).
  chat:
    type: zeroclaw

# Secrets for this agent. Provider URL and model are now sourced from the
# providers system (selected during the onboarding `providers` stage and
# rendered into ~/.zeroclaw/config.toml by configure.yaml), not from
# per-agent secrets — keeping legacy LLM_PROVIDER_URL / LLM_MODEL keys here
# made health.get_missing_secrets() report a permanent DEGRADED status on
# every correctly-configured zeroclaw instance.
secrets:
  required: []

  # Optional secrets (agent still runs without them).
  optional:
    - key: LLM_API_KEY
      description: "API key for LLM provider (optional for local)"

# Onboarding workflow configuration
onboarding:
  stages:
    providers:
      required: true
      description: "Assign inference provider"
      tasks:
        - id: select_provider
          name: "Select inference provider"
          type: provider_select
        - id: verify_provider
          name: "Verify provider connectivity"
          type: provider_test

    identity:
      required: false
      auto_skip: true
      description: "ZeroClaw uses minimal identity"

    channels:
      required: true
      description: "Configure communication channel"
      tasks:
        - id: confirm_cli
          name: "Confirm CLI channel"
          type: confirm
          message: "ZeroClaw will use CLI for communication"
          default: true

    validate:
      description: "Verify installation"
      tasks:
        - id: binary_check
          name: "Verify binary installed"
          type: command
          command: "zeroclaw --version"

# Note: Same statically-linked binary is used across OS versions (Ubuntu 22.04/24.04)
# so SHA256 checksums are identical per architecture.
platforms:
  # Raspberry Pi 2/3 (armv7l) - Debian 13 (trixie)
  - version: "0.7.5"
    os: debian
    os_version: "13"
    arch: armv7l
    sha256: "32b11166fae1647a1ea39bac0d4b14073183cd034c42a25cb543615074aefd77"
    requirements:
      min_memory_mb: 512  # Pi 2 has ~920MB usable (1GB - video mem)
      gpu_required: false
      dependencies:
        python: ">=3.9"
  # Raspberry Pi 4/5 (aarch64) - Ubuntu
  - version: "0.7.5"
    os: ubuntu
    os_version: "22.04"
    arch: aarch64
    sha256: "0b1197f1d80243e5c748b63a550cc6dfc37e407c4d15f729b32324ba9fe4c2ac"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
  - version: "0.7.5"
    os: ubuntu
    os_version: "24.04"
    arch: aarch64
    sha256: "0b1197f1d80243e5c748b63a550cc6dfc37e407c4d15f729b32324ba9fe4c2ac"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
  # Desktop/Server x86_64 - Ubuntu
  - version: "0.7.5"
    os: ubuntu
    os_version: "22.04"
    arch: x86_64
    sha256: "8bc8276a8d8faefb3e4a824f33876929e7466f632ee7c5363936368a1af2e4f7"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
  - version: "0.7.5"
    os: ubuntu
    os_version: "24.04"
    arch: x86_64
    sha256: "8bc8276a8d8faefb3e4a824f33876929e7466f632ee7c5363936368a1af2e4f7"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
