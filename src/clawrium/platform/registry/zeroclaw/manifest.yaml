name: zeroclaw
description: "Lightweight AI assistant for edge devices and Raspberry Pi"

# Secrets required for this claw (install will fail if missing)
required_secrets:
  - key: LLM_PROVIDER_URL
    description: "LLM API endpoint URL (e.g., http://192.168.1.100:11434)"
  - key: LLM_MODEL
    description: "Model name to use (e.g., llama3, gpt-4)"

# Optional secrets (claw works without them but with reduced functionality)
optional_secrets:
  - key: LLM_API_KEY
    description: "API key for LLM provider (optional for local)"
# Note: Same statically-linked binary is used across OS versions (Ubuntu 22.04/24.04)
# so SHA256 checksums are identical per architecture.
entries:
  # Raspberry Pi 2/3 (armv7l) - Debian 13 (trixie)
  - version: "0.5.7"
    os: debian
    os_version: "13"
    arch: armv7l
    sha256: "a294a8caac8304c3b895f80334f9750fba5fbf4787ca7675857e112c04914585"
    requirements:
      min_memory_mb: 512  # Pi 2 has ~920MB usable (1GB - video mem)
      gpu_required: false
      dependencies:
        python: ">=3.9"
  # Raspberry Pi 4/5 (aarch64) - Ubuntu
  - version: "0.5.7"
    os: ubuntu
    os_version: "22.04"
    arch: aarch64
    sha256: "33e3838ff86c1cbf423bdd9ce539bf1794f9b9641cbf75fa2d5d02cf466bc849"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
  - version: "0.5.7"
    os: ubuntu
    os_version: "24.04"
    arch: aarch64
    sha256: "33e3838ff86c1cbf423bdd9ce539bf1794f9b9641cbf75fa2d5d02cf466bc849"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
  # Desktop/Server x86_64 - Ubuntu
  - version: "0.5.7"
    os: ubuntu
    os_version: "22.04"
    arch: x86_64
    sha256: "c0ab82725795d97e08542b9475aa31db27a3fa76e8e5b1e3c8ec43fbbd3c4ecd"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
  - version: "0.5.7"
    os: ubuntu
    os_version: "24.04"
    arch: x86_64
    sha256: "c0ab82725795d97e08542b9475aa31db27a3fa76e8e5b1e3c8ec43fbbd3c4ecd"
    requirements:
      min_memory_mb: 1024
      gpu_required: false
      dependencies:
        python: ">=3.9"
