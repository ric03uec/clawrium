---
- hosts: all
  become: yes
  vars:
    # Loopback URLs — the daemon binds 0.0.0.0 but the playbook always talks
    # to it via 127.0.0.1 so the bearer token never traverses the network
    # before pairing completes.
    gateway_port: "{{ config.gateway.port }}"
    gateway_local_base: "http://127.0.0.1:{{ gateway_port }}"
  tasks:
    - name: Check if agent user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ agent_name }}"
      failed_when: false
      register: user_check

    - name: Fail if agent not installed
      ansible.builtin.fail:
        msg: "Agent user '{{ agent_name }}' not found. Run 'clawctl agent create <name> --type zeroclaw --host <host>' first."
      when: user_check.msg is defined

    - name: Validate provider configuration is present
      ansible.builtin.fail:
        msg: >-
          ZeroClaw configure requires config.provider.type to be one of
          anthropic|openai|ollama|openrouter. Re-run via
          `clawctl agent configure {{ agent_name }} --stage providers`.
      when:
        - config.provider is not defined
          or config.provider.type is not defined
          or config.provider.type not in ['anthropic','openai','ollama','openrouter']

    - name: Ensure ~/.zeroclaw config directory exists
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.zeroclaw"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    # Workspace personality files (issue #358). `force: no` means a
    # subsequent `clawctl agent configure` run never clobbers user edits to
    # these MD files — they seed the daemon on first configure, then the
    # operator owns the content. BOOTSTRAP.md is intentionally NOT
    # rendered: the runtime generates it on first boot and self-deletes
    # after use.
    - name: Ensure ~/.zeroclaw/workspace directory exists
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.zeroclaw/workspace"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    - name: Render zeroclaw workspace personality files
      ansible.builtin.template:
        src: "{{ template_path }}/workspace/{{ item }}.j2"
        dest: "/home/{{ agent_name }}/.zeroclaw/workspace/{{ item }}"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: no
      loop:
        - SOUL.md
        - IDENTITY.md
        - USER.md
        - AGENTS.md
        - TOOLS.md
        - MEMORY.md
        - HEARTBEAT.md

    # Render ~/.zeroclaw/config.toml. no_log because provider_api_key is
    # embedded verbatim. 0600 with agent ownership so only the service user
    # (and root) can read. Ansible's default `force: yes` (not set here)
    # only restarts the daemon when content changes — ATX S1 fix.
    # #583: deploy the pre-rendered config.toml from
    # `clawrium.core.render.render_zeroclaw` instead of re-rendering
    # the same Jinja template under Ansible's environment. The
    # canonical Python renderer owns the single source of truth for
    # the file contents (including the custom `toq` filter); Ansible
    # just lays the bytes down. This eliminates the dual-render hazard
    # where the Python path and the Ansible path could silently
    # diverge.
    - name: Deploy ~/.zeroclaw/config.toml (pre-rendered canonical content)
      ansible.builtin.copy:
        content: "{{ prerendered_zeroclaw_config_toml }}"
        dest: "/home/{{ agent_name }}/.zeroclaw/config.toml"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      no_log: true
      notify: Restart zeroclaw service

    - name: Enable zeroclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        enabled: yes
        daemon_reload: yes

    # systemd drop-in directory (#422). Hosts the clawctl-managed Environment=
    # overlay without touching the install.yaml-dropped unit file. Drop-ins
    # are the systemd-standard mechanism per `man systemd.unit` "Drop-In".
    - name: Ensure systemd drop-in directory exists for zeroclaw service
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service.d"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # Bundle 5 (#510) renamed the dropin from `10-clm-env.conf` to
    # `10-zeroclaw-env.conf`. On a host that was last configured before
    # the rename, the old file still exists in the dropin dir and systemd
    # will load BOTH dropins — leaving stale GITHUB_TOKEN values readable
    # under the old name. Drop the legacy file first so the dropin dir
    # only ever contains the current managed file. Idempotent: state:
    # absent is a no-op once the orphan is gone.
    - name: Remove legacy clawctl dropin (Bundle 5 #510 rename migration)
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service.d/10-clm-env.conf"
        state: absent
      no_log: true
      notify: Restart zeroclaw service

    # Render the GitHub-integration drop-in. The template emits an empty
    # [Service] block when no github integrations are assigned — systemd
    # treats that as a no-op overlay. Mode 0600 because the file contains
    # the GITHUB_TOKEN verbatim (read-only to root; systemd is started as
    # root so this is fine). notify the restart handler so the drop-in is
    # picked up before /health/providers is probed.
    - name: Render zeroclaw GitHub-integration systemd drop-in
      ansible.builtin.template:
        src: "{{ template_path }}/zeroclaw-env.conf.j2"
        dest: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service.d/10-zeroclaw-env.conf"
        owner: root
        group: root
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart zeroclaw service

    # Render ~/.gitconfig for each `git` integration (#531). Positioned
    # BEFORE `gh auth setup-git` so the credential.helper key that setup-git
    # writes survives — setup-git appends to the existing gitconfig, but
    # ansible.builtin.template overwrites the whole file. Reverse order
    # would silently drop the credential.helper line.
    # selectattr filter returns an empty list when no `git` integration is
    # assigned, making this a no-op on existing fleets.
    - name: Render ~/.gitconfig for each git integration
      ansible.builtin.template:
        src: "{{ shared_template_path }}/gitconfig.j2"
        dest: "/home/{{ agent_name }}/.gitconfig"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
      become: yes
      become_user: "{{ agent_name }}"
      no_log: true
      when: integrations is defined
      loop: "{{ integrations | dict2items | selectattr('value.type', 'equalto', 'git') | list }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        git:
          user_name:            "{{ item.value.GIT_USER_NAME | default('') }}"
          user_email:           "{{ item.value.GIT_USER_EMAIL | default('') }}"
          init_default_branch:  "{{ item.value.GIT_INIT_DEFAULT_BRANCH | default('main') }}"
          pull_rebase:          "{{ item.value.GIT_PULL_REBASE | default('false') }}"
          core_editor:          "{{ item.value.GIT_CORE_EDITOR | default('vim') }}"

    # GitHub CLI authentication block (#422, mirrors hermes configure.yaml).
    # `gh` is a soft dependency: when absent, the Environment= drop-in above
    # still wires GITHUB_TOKEN so skills calling the GitHub REST API
    # directly continue to work. `changed_when: false` keeps the task
    # idempotent — re-running configure against an authenticated host
    # reports `ok` rather than `changed`.
    - name: GitHub CLI authentication block
      when: integrations is defined
      block:
        - name: Check if gh CLI is installed
          ansible.builtin.command: which gh
          register: gh_check
          changed_when: false
          failed_when: false

        - name: Authenticate gh CLI for each github integration
          ansible.builtin.command:
            argv:
              - gh
              - auth
              - login
              - --with-token
            stdin: "{{ item.value.GITHUB_TOKEN }}"
          become: yes
          become_user: "{{ agent_name }}"
          no_log: true
          changed_when: false
          when:
            - gh_check.rc == 0
            - item.value.type == 'github'
            - item.value.GITHUB_TOKEN is defined
          loop: "{{ integrations | dict2items }}"
          loop_control:
            label: "{{ item.key }}"

        # Configure git's credential helper to use gh's stored token for
        # HTTPS pushes. `gh auth login --with-token` authenticates the
        # `gh` CLI but does NOT touch git's credential.helper — without
        # this, `git push https://github.com/...` fails to find the
        # token even though the agent shell has GITHUB_TOKEN in env.
        # Runs once per configure (not per-integration) because the
        # credential helper is a host-level git config, not a per-token
        # setting. Idempotent — `gh auth setup-git` overwrites the
        # same config keys on each run.
        - name: Configure git credential helper via gh auth setup-git
          ansible.builtin.command:
            argv:
              - gh
              - auth
              - setup-git
          become: yes
          become_user: "{{ agent_name }}"
          changed_when: false
          when:
            - gh_check.rc == 0
            - integrations | dict2items
              | selectattr('value.type', 'equalto', 'github')
              | list | length > 0

    # Apply pending restart (from the template task) before the readiness
    # probe so /health is observing the just-rendered config, not the
    # previous incarnation.
    - name: Apply pending restart before probing
      ansible.builtin.meta: flush_handlers

    - name: Start zeroclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: started

    # Fail fast if the daemon crashed on startup — better than waiting out
    # 30×2s of /health retries (ATX W4). ActiveState may be `activating`
    # momentarily; accept that as in-progress and let the health probe
    # finish the wait.
    - name: Verify zeroclaw service did not crash on startup
      ansible.builtin.command:
        cmd: "systemctl show -p ActiveState --value {{ agent_type }}-{{ agent_name }}"
      register: service_state
      changed_when: false
      failed_when: service_state.stdout.strip() in ['failed', 'inactive']

    # Wait for the daemon to come up. /health/providers is the canonical
    # readiness signal — it 200s only after the provider config has been
    # parsed and the gateway is listening. Accept 401 too because the
    # endpoint may require pairing-auth before serving — the existence of
    # a response means the gateway is up.
    - name: Probe /health/providers
      ansible.builtin.uri:
        url: "{{ gateway_local_base }}/health/providers"
        method: GET
        status_code: [200, 401]
        timeout: 5
      register: health_probe
      retries: 30
      delay: 2
      until: health_probe.status in [200, 401]
      # ATX Round 3 S1: bring the health probe in line with the rest of
      # the playbook's `no_log: true` hygiene. The probe body itself is
      # non-secret but the registered `health_probe` is later used in
      # `set_fact` branches gated on `status` — suppress to keep the
      # log surface tight at high verbosity.
      no_log: true

    # ATX Round 1 W3 + Round 2 W1 + Round 3 W1: surface a non-fatal
    # warning when /health/providers returns 401. The gateway is up but
    # the provider credentials probably mismatch the API key supplied in
    # config.toml — chat calls will fail at request time.
    #
    # The fact (not just the debug task) is what configure_agent reads —
    # `ansible_runner.run(quiet=True)` does not surface `runner_on_debug`
    # events, so a pure `debug:` task would be silently swallowed at the
    # CLI layer. Recording it as a cacheable fact ensures the warning
    # propagates through the same fact-cache path the bearer token uses.
    #
    # Round 3 W1: assign the literal boolean unconditionally so a healthy
    # run (status 200) clears any stale `true` left over from a prior
    # 401 — `cacheable: true` would otherwise keep the previous value
    # persisted in Ansible's fact cache and emit a phantom warning on
    # every subsequent configure.
    - name: Record provider-health warning state
      ansible.builtin.set_fact:
        zeroclaw_provider_health_warning: "{{ health_probe.status == 401 }}"
        cacheable: true

    - name: Warn when /health/providers returned 401
      ansible.builtin.debug:
        msg: >-
          /health/providers returned 401 — gateway is reachable but
          provider credentials may be invalid. Verify the API key for
          provider '{{ config.provider.type }}' and re-run
          `clawctl agent configure {{ agent_name }}` if needed.
      when: health_probe.status == 401

    # Always re-pair (issue #437). The daemon does not persist bearer
    # state across restarts, so the only way to make hosts.json
    # structurally agree with the daemon is to mint a fresh token on
    # every configure run. The trade-off (in-flight `clawctl agent chat` sessions
    # on other machines need to reconnect) is accepted in exchange for
    # eliminating the silent divergence class entirely.
    - name: Run zeroclaw pair handshake
      ansible.builtin.include_tasks: tasks/pair.yaml

    # Discord-config verification (#422). Confirms the bot token + an
    # allowlist landed in config.toml when Discord is enabled. grep -q so
    # we get a clean exit status without leaking the rendered key into logs.
    # Uses dict.get() pattern (not attribute access) so undefined keys
    # don't error under Ansible 2.20+'s strict Jinja mode.
    - name: Verify config.toml contains bot_token when Discord enabled
      ansible.builtin.command:
        cmd: grep -qE '^bot_token\s*=' "/home/{{ agent_name }}/.zeroclaw/config.toml"
      register: discord_token_check
      changed_when: false
      failed_when: discord_token_check.rc != 0
      no_log: true
      when:
        - config.channels is defined
        - config.channels.discord is defined
        - config.channels.discord.enabled | default(false)

    # Autonomy block always renders, so the grep is unconditional. This
    # catches a Jinja regression that drops the block (which would silently
    # disable shell_env_passthrough → tools lose GITHUB_TOKEN, _SECRET, etc.).
    - name: Verify config.toml renders [autonomy] block with shell_env_passthrough
      ansible.builtin.command:
        cmd: grep -qE '^shell_env_passthrough\s*=' "/home/{{ agent_name }}/.zeroclaw/config.toml"
      register: autonomy_check
      changed_when: false
      failed_when: autonomy_check.rc != 0

    - name: Display configure success
      ansible.builtin.debug:
        msg: |
          ZeroClaw agent '{{ agent_name }}' configured with provider
          '{{ config.provider.type }}'.
          Pairing: fresh token minted (issue #437 — every lifecycle op re-pairs).
          Service: {{ agent_type }}-{{ agent_name }}.service (active)

  handlers:
    # Single canonical restart handler. daemon_reload covers config-file
    # changes that don't touch the unit, and the same restart fires once per
    # configure regardless of how many notify directives match.
    - name: Restart zeroclaw service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: restarted
        enabled: yes
        daemon_reload: yes
