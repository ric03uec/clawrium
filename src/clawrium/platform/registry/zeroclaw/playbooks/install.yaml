---
- hosts: all
  become: yes
  vars:
    # Map ansible architecture to zeroclaw release naming
    arch_map:
      armv7l: "armv7-unknown-linux-gnueabihf"
      aarch64: "aarch64-unknown-linux-gnu"
      x86_64: "x86_64-unknown-linux-gnu"
    supported_architectures:
      - armv7l
      - aarch64
      - x86_64
    release_arch: "{{ arch_map[ansible_architecture] }}"
    release_url: "https://github.com/zeroclaw-labs/zeroclaw/releases/download/{{ claw_version }}/zeroclaw-{{ release_arch }}.tar.gz"

  pre_tasks:
    - name: Validate architecture is supported
      ansible.builtin.fail:
        msg: "Unsupported architecture: {{ ansible_architecture }}. Supported: {{ supported_architectures | join(', ') }}"
      when: ansible_architecture not in supported_architectures

  tasks:
    - name: Create claw user
      ansible.builtin.user:
        name: "{{ claw_user }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Create bin directory
      ansible.builtin.file:
        path: "/home/{{ claw_user }}/bin"
        state: directory
        owner: "{{ claw_user }}"
        group: "{{ claw_user }}"
        mode: "0755"

    - name: Download zeroclaw binary
      ansible.builtin.get_url:
        url: "{{ release_url }}"
        dest: "/tmp/zeroclaw-{{ release_arch }}.tar.gz"
        mode: "0644"
        checksum: "sha256:{{ claw_sha256 }}"

    - name: Extract zeroclaw binary
      ansible.builtin.unarchive:
        src: "/tmp/zeroclaw-{{ release_arch }}.tar.gz"
        dest: "/home/{{ claw_user }}/bin"
        remote_src: yes
        owner: "{{ claw_user }}"
        group: "{{ claw_user }}"

    - name: Cleanup tarball
      ansible.builtin.file:
        path: "/tmp/zeroclaw-{{ release_arch }}.tar.gz"
        state: absent

    - name: Create workspace directory
      ansible.builtin.file:
        path: "/home/{{ claw_user }}/workspace"
        state: directory
        owner: "{{ claw_user }}"
        group: "{{ claw_user }}"
        mode: "0700"

    - name: Create config directory
      ansible.builtin.file:
        path: "/home/{{ claw_user }}/.zeroclaw"
        state: directory
        owner: "{{ claw_user }}"
        group: "{{ claw_user }}"
        mode: "0700"

    - name: Calculate unique gateway port (40000-42000 range)
      ansible.builtin.set_fact:
        gateway_port: "{{ 40000 + ((claw_user | hash('md5') | int(base=16)) % 2000) }}"

    - name: Create zeroclaw config
      ansible.builtin.copy:
        dest: "/home/{{ claw_user }}/.zeroclaw/config.toml"
        content: |
          [gateway]
          port = {{ gateway_port }}

          {% if llm_provider_url is defined %}
          default_provider = "custom:{{ llm_provider_url }}"
          default_model = "{{ llm_model | default('llama3') }}"
          api_key = "{{ llm_api_key | default('') }}"
          {% endif %}
        owner: "{{ claw_user }}"
        group: "{{ claw_user }}"
        mode: "0600"

    - name: Create systemd service file
      ansible.builtin.copy:
        dest: "/etc/systemd/system/zeroclaw-{{ claw_user }}.service"
        content: |
          [Unit]
          Description=ZeroClaw AI Assistant ({{ claw_user }})
          After=network.target

          [Service]
          Type=simple
          User={{ claw_user }}
          WorkingDirectory=/home/{{ claw_user }}/workspace
          ExecStart=/home/{{ claw_user }}/bin/zeroclaw daemon
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Reload systemd

    - name: Enable and start zeroclaw service
      ansible.builtin.systemd:
        name: "zeroclaw-{{ claw_user }}"
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
