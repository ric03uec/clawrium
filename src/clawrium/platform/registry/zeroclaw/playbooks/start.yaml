---
- hosts: all
  become: yes
  tasks:
    - name: Check if systemd service exists
      ansible.builtin.stat:
        path: "/etc/systemd/system/zeroclaw-{{ claw_user }}.service"
      register: service_file

    - name: Fail if service not installed
      ansible.builtin.fail:
        msg: "ZeroClaw service not installed. Run 'clm agent install' first."
      when: not service_file.stat.exists

    - name: Start zeroclaw service
      ansible.builtin.systemd:
        name: "zeroclaw-{{ claw_user }}"
        state: started
        enabled: yes
        daemon_reload: yes
      register: start_result

    - name: Wait for service to be active
      ansible.builtin.systemd:
        name: "zeroclaw-{{ claw_user }}"
      register: service_status
      until: service_status.status.ActiveState == "active"
      retries: 10
      delay: 3

    - name: Verify process is running
      ansible.builtin.shell: |
        pgrep -u {{ claw_user }} zeroclaw
      register: process_check
      changed_when: false
      failed_when: process_check.rc != 0

    - name: Get process info
      ansible.builtin.shell: |
        pgrep -u {{ claw_user }} zeroclaw | head -1
      register: pid_result
      changed_when: false

    - name: Display success message
      ansible.builtin.debug:
        msg: "ZeroClaw started successfully (PID: {{ pid_result.stdout }})"
