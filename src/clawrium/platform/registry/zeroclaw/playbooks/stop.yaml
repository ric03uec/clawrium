---
- hosts: all
  become: yes
  tasks:
    - name: Check if systemd service exists
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
      register: service_file

    - name: Stop zeroclaw service gracefully
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: stopped
      register: stop_result
      when: service_file.stat.exists
      ignore_errors: yes

    - name: Wait for service to stop
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
      register: service_status
      until: service_status.status.ActiveState != "active"
      retries: 10
      delay: 2
      when: service_file.stat.exists
      ignore_errors: yes

    - name: Verify process is stopped
      ansible.builtin.command:
        cmd: pgrep -u {{ agent_name }} zeroclaw
      register: process_check
      changed_when: false
      failed_when: process_check.rc == 0

    - name: Display success message
      ansible.builtin.debug:
        msg: "ZeroClaw stopped successfully"
