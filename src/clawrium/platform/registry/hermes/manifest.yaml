agent:
  type: hermes
  description: "Nous Research self-improving AI agent (Python)"

# Workspace metadata consumed by cross-claw subsystems (memory CLI, etc.).
# Phase 3 will read this to dispatch memory operations to ~/.hermes/memories/.
workspace:
  memory_path: "~/.hermes/memories"

# Capability flags advertised by this manifest.
features:
  memory: true
  # Chat dispatch resolves to the OpenAI-compatible HTTP backend for hermes.
  chat:
    type: openai
  # Native browser dashboard shipped by hermes upstream. Bound to loopback
  # on the agent host; clawctl tunnels through SSH (see issue #478). `port_field`
  # is the dotted path inside `hosts.json.agents.<name>.config` where the
  # per-instance dashboard port is persisted at install time. No
  # `default_port`: install.py computes a per-instance port in 45000..46999
  # so a manifest-wide default would silently collide on a host running
  # multiple hermes instances (issue #491).
  web_ui:
    enabled: true
    bind: loopback
    port_field: dashboard.port

# Secrets configuration.
# All provider keys are optional: Phase 1 installs the binary in an inert state.
# Phase 2 (configure) writes ~/.hermes/.env with the active provider's key and
# the API_SERVER_KEY needed to bring the gateway online.
secrets:
  required: []

  optional:
    - key: OPENROUTER_API_KEY
      description: "OpenRouter API key (200+ models)"
    - key: ANTHROPIC_API_KEY
      description: "Anthropic API key"
    - key: OPENAI_API_KEY
      description: "OpenAI API key"
    - key: AWS_ACCESS_KEY_ID
      description: "AWS access key ID for Bedrock provider"
    - key: AWS_SECRET_ACCESS_KEY
      description: "AWS secret access key for Bedrock provider"
    # Atlassian credentials are NOT listed here: they live in the per-integration
    # credential store (managed via `clawctl integration credentials`) and a single
    # hermes agent may have multiple atlassian integrations (team-a, team-b)
    # with distinct tokens — a single manifest key would be ambiguous.

# Onboarding workflow configuration.
#
# Phase 4 replaces the Phase 1 placeholder (where every stage was auto-skipped
# to short-circuit to READY) with a real onboarding pipeline. `clawctl agent start`
# now requires the user to walk through `clawctl agent configure` first, mirroring
# the openclaw flow.
#
# Stage notes:
#   providers  required.  provider_select + provider_test, identical wiring
#              to openclaw. Selecting a provider writes ~/.hermes/.env and
#              ~/.hermes/config.yaml on the agent host (Phase 2 logic).
#   identity   auto_skip. Hermes manages its own identity files (SOUL.md,
#              AGENTS.md) inside ~/.hermes/ on the agent host; clawctl does not
#              push identity files in this iteration. The wizard records this
#              stage as SKIPPED and advances.
#   channels   default `cli`. The api_server platform exposes an
#              OpenAI-compatible HTTP API on 0.0.0.0:<api_server_port> (all
#              interfaces, bearer-token protected via HERMES_API_SERVER_KEY)
#              so `clawctl chat <hermes>` can reach it at
#              http://<host-ip>:<api_server_port>/v1 from any clawctl machine on
#              the LAN. The port is per-instance, picked at install time
#              from 8600..8699 (issue #533). External messaging gateways
#              (Discord/Slack/Telegram/etc.) are out of scope and tracked as a
#              separate follow-up issue.
#   validate   Composite shell-level check: `hermes --version` succeeds,
#              ~/.hermes/.env exists, and GET /health returns 200.
onboarding:
  stages:
    providers:
      required: true
      description: "Assign inference provider"
      tasks:
        - id: select_provider
          name: "Select inference provider"
          type: provider_select
        - id: verify_provider
          name: "Verify provider connectivity"
          type: provider_test

    identity:
      required: false
      auto_skip: true
      description: "Hermes manages SOUL.md/AGENTS.md inside ~/.hermes/; clawctl does not push identity files in this iteration"

    channels:
      required: true
      description: "Configure communication channels (cli always on; discord/slack optional)"
      tasks:
        - id: confirm_cli
          name: "Confirm CLI channel"
          type: confirm
          message: "Hermes will expose its OpenAI-compatible API on all interfaces, bearer-token protected, reachable at http://<host-ip>:<api_server_port>/v1 from any clawctl machine on the LAN. The port is per-instance (8600..8699); see `clawctl agent describe`."
          default: true
        - id: select_discord
          name: "Enable Discord channel (optional)"
          type: confirm
          message: "Enable Discord messaging for this agent?"
          default: false
        # DEPRECATED (#555): the `--stage channels` interactive flow has been
        # retired. Channels are now first-class attachables — see
        # `clawctl channel registry create --type discord` and
        # `clawctl agent channel attach`. Token persists to secrets.json under
        # channel:<name>:DISCORD_BOT_TOKEN; non-sensitive config lives in
        # channels.json. The agent attachment list is
        # hosts.json.agents.<name>.channels[].
        - id: select_slack
          name: "Enable Slack channel (optional)"
          type: confirm
          message: "Enable Slack messaging (Socket Mode) for this agent?"
          default: false
        # DEPRECATED (#555): the `--stage channels` interactive flow has been
        # retired. Use `clawctl channel registry create --type slack` and
        # `clawctl agent channel attach`. Tokens persist to secrets.json under
        # channel:<name>:{SLACK_BOT_TOKEN,SLACK_APP_TOKEN}; non-sensitive
        # config lives in channels.json. The agent attachment list is
        # hosts.json.agents.<name>.channels[].

    validate:
      required: true
      description: "Verify hermes is healthy"
      tasks:
        - id: binary_check
          name: "Verify hermes binary"
          type: command
          command: "hermes --version"
        - id: env_check
          name: "Verify ~/.hermes/.env exists"
          type: file_exists
          paths:
            - "~/.hermes/.env"
        - id: health_check
          name: "Verify api_server /health returns 200"
          type: command
          # The actual port is per-instance (issue #533). This `command`
          # field is descriptive — the live probe is run by
          # validate_hermes_health() in src/clawrium/core/validation.py,
          # which reads the port from hosts.json.
          command: "curl -fsS http://0.0.0.0:<api_server_port>/health"

# Note: The hermes installer is a single bash script served from
# raw.githubusercontent.com at the pinned tag. The same script content is
# fetched for both Ubuntu 22.04 and 24.04, so the sha256 below is identical
# across platform entries by design.
platforms:
  - version: "2026.5.7"
    os: ubuntu
    os_version: "24.04"
    arch: x86_64
    sha256: "b34368cb0628d5acbdc48fe6f4160fb6f51bb33377e8f5a7415fd790a57456e5"
    requirements:
      min_memory_mb: 2048
      gpu_required: false
      dependencies:
        python: ">=3.11"
        ripgrep: "*"
        ffmpeg: "*"
        uv: "*"
  - version: "2026.5.7"
    os: ubuntu
    os_version: "22.04"
    arch: x86_64
    sha256: "b34368cb0628d5acbdc48fe6f4160fb6f51bb33377e8f5a7415fd790a57456e5"
    requirements:
      min_memory_mb: 2048
      gpu_required: false
      dependencies:
        python: ">=3.11"
        ripgrep: "*"
        ffmpeg: "*"
        uv: "*"
  # macOS entry — uses ">=14" so the same line tracks new macOS releases
  # without manifest churn. The sha256 mirrors the Linux entries because the
  # upstream `install.sh` URL is identical across platforms (the script
  # itself dispatches on OS internally). Step 5 of issue #469 may revise this
  # if the install path forks to a separate upstream URL.
  - version: "2026.5.7"
    os: macos
    os_version: ">=14"
    arch: arm64
    sha256: "b34368cb0628d5acbdc48fe6f4160fb6f51bb33377e8f5a7415fd790a57456e5"
    requirements:
      min_memory_mb: 2048
      gpu_required: false
      dependencies:
        ripgrep: "*"
        ffmpeg: "*"
        uv: "*"
  - version: "2026.5.29.2"
    os: ubuntu
    os_version: "24.04"
    arch: x86_64
    sha256: "82978b9ed77fc851d9f0dc5009e69790424e344ea3e856a5948bd78b30981481"
    requirements:
      min_memory_mb: 2048
      gpu_required: false
      dependencies:
        python: ">=3.11"
        ripgrep: "*"
        ffmpeg: "*"
        uv: "*"
  - version: "2026.5.29.2"
    os: ubuntu
    os_version: "22.04"
    arch: x86_64
    sha256: "82978b9ed77fc851d9f0dc5009e69790424e344ea3e856a5948bd78b30981481"
    requirements:
      min_memory_mb: 2048
      gpu_required: false
      dependencies:
        python: ">=3.11"
        ripgrep: "*"
        ffmpeg: "*"
        uv: "*"
  - version: "2026.5.29.2"
    os: macos
    os_version: ">=14"
    arch: arm64
    sha256: "82978b9ed77fc851d9f0dc5009e69790424e344ea3e856a5948bd78b30981481"
    requirements:
      min_memory_mb: 2048
