agent:
  type: hermes
  description: "Nous Research self-improving AI agent (Python)"

# Workspace metadata consumed by cross-claw subsystems (memory CLI, etc.).
# Phase 3 will read this to dispatch memory operations to ~/.hermes/memories/.
workspace:
  memory_path: "~/.hermes/memories"

# Capability flags advertised by this manifest.
features:
  memory: true
  # Chat dispatch resolves to the OpenAI-compatible HTTP backend for hermes.
  chat:
    type: openai

# Secrets configuration.
# All provider keys are optional: Phase 1 installs the binary in an inert state.
# Phase 2 (configure) writes ~/.hermes/.env with the active provider's key and
# the API_SERVER_KEY needed to bring the gateway online.
secrets:
  required: []

  optional:
    - key: OPENROUTER_API_KEY
      description: "OpenRouter API key (200+ models)"
    - key: ANTHROPIC_API_KEY
      description: "Anthropic API key"
    - key: OPENAI_API_KEY
      description: "OpenAI API key"

# Onboarding workflow configuration.
#
# Phase 4 replaces the Phase 1 placeholder (where every stage was auto-skipped
# to short-circuit to READY) with a real onboarding pipeline. `clm agent start`
# now requires the user to walk through `clm agent configure` first, mirroring
# the openclaw flow.
#
# Stage notes:
#   providers  required.  provider_select + provider_test, identical wiring
#              to openclaw. Selecting a provider writes ~/.hermes/.env and
#              ~/.hermes/config.yaml on the agent host (Phase 2 logic).
#   identity   auto_skip. Hermes manages its own identity files (SOUL.md,
#              AGENTS.md) inside ~/.hermes/ on the agent host; clm does not
#              push identity files in this iteration. The wizard records this
#              stage as SKIPPED and advances.
#   channels   default `cli`. The api_server platform exposes an
#              OpenAI-compatible HTTP API on 0.0.0.0:8642 (all interfaces,
#              bearer-token protected via HERMES_API_SERVER_KEY) so
#              `clm chat <hermes>` can reach it at http://<host-ip>:8642/v1
#              from any clm machine on the LAN. External messaging gateways
#              (Discord/Slack/Telegram/etc.) are out of scope and tracked as a
#              separate follow-up issue.
#   validate   Composite shell-level check: `hermes --version` succeeds,
#              ~/.hermes/.env exists, and GET /health returns 200.
onboarding:
  stages:
    providers:
      required: true
      description: "Assign inference provider"
      tasks:
        - id: select_provider
          name: "Select inference provider"
          type: provider_select
        - id: verify_provider
          name: "Verify provider connectivity"
          type: provider_test

    identity:
      required: false
      auto_skip: true
      description: "Hermes manages SOUL.md/AGENTS.md inside ~/.hermes/; clm does not push identity files in this iteration"

    channels:
      required: true
      description: "Configure communication channels (cli always on; discord/slack optional)"
      tasks:
        - id: confirm_cli
          name: "Confirm CLI channel"
          type: confirm
          message: "Hermes will expose its OpenAI-compatible API on all interfaces (0.0.0.0:8642), bearer-token protected, reachable at http://<host-ip>:8642/v1 from any clm machine on the LAN."
          default: true
        - id: select_discord
          name: "Enable Discord channel (optional)"
          type: confirm
          message: "Enable Discord messaging for this agent?"
          default: false
        # When select_discord=yes, the CLI prompts interactively for the bot
        # token, allowed-user IDs, optional home channel, optional allowed
        # channel allowlist, and require-mention toggle. Token persists to
        # secrets.json under DISCORD_BOT_TOKEN; the rest land in hosts.json
        # under config.channels.discord.
        - id: select_slack
          name: "Enable Slack channel (optional)"
          type: confirm
          message: "Enable Slack messaging (Socket Mode) for this agent?"
          default: false
        # When select_slack=yes, the CLI prompts interactively for the bot
        # token (xoxb-), app token (xapp-), allowed-user IDs, optional home
        # channel, and home channel name. Tokens persist to secrets.json
        # under SLACK_BOT_TOKEN and SLACK_APP_TOKEN; the rest land in
        # hosts.json under config.channels.slack.

    validate:
      required: true
      description: "Verify hermes is healthy"
      tasks:
        - id: binary_check
          name: "Verify hermes binary"
          type: command
          command: "hermes --version"
        - id: env_check
          name: "Verify ~/.hermes/.env exists"
          type: file_exists
          paths:
            - "~/.hermes/.env"
        - id: health_check
          name: "Verify api_server /health returns 200"
          type: command
          command: "curl -fsS http://0.0.0.0:8642/health"

# Note: The hermes installer is a single bash script served from
# raw.githubusercontent.com at the pinned tag. The same script content is
# fetched for both Ubuntu 22.04 and 24.04, so the sha256 below is identical
# across platform entries by design.
platforms:
  - version: "2026.5.7"
    os: ubuntu
    os_version: "24.04"
    arch: x86_64
    sha256: "b34368cb0628d5acbdc48fe6f4160fb6f51bb33377e8f5a7415fd790a57456e5"
    requirements:
      min_memory_mb: 2048
      gpu_required: false
      dependencies:
        python: ">=3.11"
        ripgrep: "*"
        ffmpeg: "*"
  - version: "2026.5.7"
    os: ubuntu
    os_version: "22.04"
    arch: x86_64
    sha256: "b34368cb0628d5acbdc48fe6f4160fb6f51bb33377e8f5a7415fd790a57456e5"
    requirements:
      min_memory_mb: 2048
      gpu_required: false
      dependencies:
        python: ">=3.11"
        ripgrep: "*"
        ffmpeg: "*"
