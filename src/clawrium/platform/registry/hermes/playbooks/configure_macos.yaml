---
# macOS counterpart to configure.yaml. Deploys the pre-rendered
# canonical hermes config files (from clawrium.core.render.render_hermes —
# see #622) into /Users/<agent>/.hermes/ instead of /home/<agent>/.hermes/,
# and DOES NOT touch systemd — launchctl lifecycle is owned by
# core/lifecycle_macos.py.
#
# Intentional differences from configure.yaml beyond paths:
#   - No re-render of a service unit. The launchd plist (step 6) is
#     written by core/launchd.py at start time; configure does not
#     manage it.
#   - The atlassian MCP toolchain bootstrap (uv tarball install, MCP
#     atlassian package install) is omitted from this initial cut.
#     atlassian integration is tracked as a follow-up after the
#     core E2E ships.
#   - #834: slack-mcp-server (single Go binary from
#     korotovsky/slack-mcp-server) IS installed on darwin — Slack is
#     the first MCP subprocess to land on darwin hermes (W11 in #499
#     plan). The install is gated on `slack_integration_assigned` so
#     agents without slack pay no cost.
- hosts: all
  become: yes
  vars:
    # #835 (B9 fix): `mcp_slack_version`, `mcp_slack_arch_map`,
    # `mcp_slack_sha256_map` are extravars owned by
    # `clawrium.core.playbook_resolver.mcp_slack_extravars`. See the
    # Linux `configure.yaml` header comment for rationale.
    slack_integration_assigned: >-
      {{
        integrations is defined
        and (integrations | dict2items
              | selectattr('value.type', 'in', ['slack-user', 'slack-cookie'])
              | list | length > 0)
      }}
  tasks:
    - name: Refuse to run on non-Darwin hosts (dispatcher contract)
      ansible.builtin.fail:
        msg: configure_macos.yaml invoked against non-Darwin host
      when: ansible_os_family != "Darwin"

    - name: Check that agent user exists via dscl
      ansible.builtin.command: "dscl . -read /Users/{{ agent_name | quote }} UniqueID"
      register: agent_user_check
      changed_when: false
      failed_when: false

    - name: Fail if hermes agent user is missing
      ansible.builtin.fail:
        msg: >-
          Agent user '{{ agent_name }}' not found. Run
          `clawctl agent create <name> --type hermes --host <host>` first.
      when: agent_user_check.rc != 0

    - name: Verify API_SERVER_KEY is present in config
      ansible.builtin.fail:
        msg: |
          api_server.key is missing for agent '{{ agent_name }}'.
          Re-run `clawctl agent create <name> --type hermes --host <host>` to regenerate.
      when: config.api_server is not defined or not config.api_server.key

    - name: Ensure ~/.hermes config directory exists
      ansible.builtin.file:
        path: "/Users/{{ agent_name }}/.hermes"
        state: directory
        owner: "{{ agent_name }}"
        group: staff
        mode: "0700"

    # Deploy ~/.hermes/.env (pre-rendered canonical content from
    # render_hermes — see #622).
    - name: Deploy ~/.hermes/.env (pre-rendered canonical content)
      ansible.builtin.copy:
        content: "{{ prerendered_hermes_env }}"
        dest: "/Users/{{ agent_name }}/.hermes/.env"
        owner: "{{ agent_name }}"
        group: staff
        mode: "0600"
        force: yes
      no_log: true

    # Deploy ~/.hermes/config.yaml (pre-rendered canonical content from
    # render_hermes — see #622). Hermes deep-merges with DEFAULT_CONFIG.
    - name: Deploy ~/.hermes/config.yaml (pre-rendered canonical content)
      ansible.builtin.copy:
        content: "{{ prerendered_hermes_config_yaml }}"
        dest: "/Users/{{ agent_name }}/.hermes/config.yaml"
        owner: "{{ agent_name }}"
        group: staff
        mode: "0600"
        force: yes
      no_log: true

    # Render ~/.gitconfig for each `git` integration (#531).
    - name: Render ~/.gitconfig for each git integration
      ansible.builtin.template:
        src: "{{ shared_template_path }}/gitconfig.j2"
        dest: "/Users/{{ agent_name }}/.gitconfig"
        owner: "{{ agent_name }}"
        group: staff
        mode: "0600"
      become: yes
      become_user: "{{ agent_name }}"
      no_log: true
      when: integrations is defined
      loop: "{{ integrations | dict2items | selectattr('value.type', 'equalto', 'git') | list }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        git:
          user_name:            "{{ item.value.GIT_USER_NAME | default('') }}"
          user_email:           "{{ item.value.GIT_USER_EMAIL | default('') }}"
          init_default_branch:  "{{ item.value.GIT_INIT_DEFAULT_BRANCH | default('main') }}"
          pull_rebase:          "{{ item.value.GIT_PULL_REBASE | default('false') }}"
          core_editor:          "{{ item.value.GIT_CORE_EDITOR | default('vim') }}"

    # Per-provider credential verification (mirrors configure.yaml shape)
    - name: Verify .env credentials for OpenRouter provider
      ansible.builtin.command:
        cmd: grep -q '^OPENROUTER_API_KEY=' "/Users/{{ agent_name }}/.hermes/.env"
      register: openrouter_check
      changed_when: false
      failed_when: openrouter_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'openrouter'
        - provider_api_key | default('') | length > 0

    - name: Verify .env credentials for Anthropic provider
      ansible.builtin.command:
        cmd: grep -q '^ANTHROPIC_API_KEY=' "/Users/{{ agent_name }}/.hermes/.env"
      register: anthropic_check
      changed_when: false
      failed_when: anthropic_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'anthropic'
        - provider_api_key | default('') | length > 0

    - name: Verify .env credentials for OpenAI provider
      ansible.builtin.command:
        cmd: grep -q '^OPENAI_API_KEY=' "/Users/{{ agent_name }}/.hermes/.env"
      register: openai_check
      changed_when: false
      failed_when: openai_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'openai'
        - provider_api_key | default('') | length > 0

    # Verify the API_SERVER block always renders, regardless of provider.
    # Mirrors configure.yaml:270-276. Uses grep -q rather than lineinfile
    # check_mode because the latter reports `changed: true` whenever the
    # matched line differs from the placeholder. The python prerender
    # already guarantees the key is rendered into the file, so this is
    # defense-in-depth: any future code path that bypasses the prerender
    # guard surfaces here as an actionable Ansible failure rather than a
    # silent broken-token deploy. (#625 W-NEW-5)
    - name: Verify .env contains API_SERVER_KEY
      ansible.builtin.command:
        cmd: grep -q '^API_SERVER_KEY=' "/Users/{{ agent_name }}/.hermes/.env"
      register: api_server_key_check
      changed_when: false
      failed_when: api_server_key_check.rc != 0
      no_log: true

    # Discord platform verification — only runs when channels.discord.enabled
    # is true. Confirms the bot token landed in .env and the allowlist guard
    # is present, since hermes denies every message without one of those.
    # Mirrors configure.yaml:282-304. (#625 W-NEW-5)
    - name: Verify .env contains DISCORD_BOT_TOKEN when Discord enabled
      ansible.builtin.command:
        cmd: grep -q '^DISCORD_BOT_TOKEN=' "/Users/{{ agent_name }}/.hermes/.env"
      register: discord_token_check
      changed_when: false
      failed_when: discord_token_check.rc != 0
      no_log: true
      when:
        - config.channels is defined
        - config.channels.discord is defined
        - config.channels.discord.enabled | default(false)

    - name: Verify .env declares Discord user allowlist when Discord enabled
      ansible.builtin.command:
        cmd: grep -qE "^(DISCORD_ALLOWED_USERS=.+|DISCORD_ALLOW_ALL_USERS=true)" "/Users/{{ agent_name }}/.hermes/.env"
      register: discord_allowlist_check
      changed_when: false
      failed_when: discord_allowlist_check.rc != 0
      no_log: true
      when:
        - config.channels is defined
        - config.channels.discord is defined
        - config.channels.discord.enabled | default(false)

    # #834: install korotovsky/slack-mcp-server (single Go binary) into
    # /Users/<agent>/.local/bin/. macOS uses a different ansible arch
    # naming (`arm64` for Apple Silicon; `x86_64` for Intel), so the map
    # keys diverge from the Linux configure.yaml deliberately.
    - name: Fail early if darwin architecture is unsupported by the slack-mcp arch map
      ansible.builtin.fail:
        msg: >-
          slack-mcp-server install: ansible_architecture='{{ ansible_architecture }}'
          is not mapped to a korotovsky/slack-mcp-server darwin release asset.
          Supported here: {{ mcp_slack_arch_map.keys() | list | join(', ') }}.
          See https://github.com/korotovsky/slack-mcp-server/releases/tag/{{ mcp_slack_version }}.
      when:
        - slack_integration_assigned | bool
        - ansible_architecture not in mcp_slack_arch_map

    - name: Ensure ~/.local/bin exists (darwin)
      ansible.builtin.file:
        path: "/Users/{{ agent_name }}/.local/bin"
        state: directory
        owner: "{{ agent_name }}"
        group: staff
        mode: '0755'
      become: true
      when:
        - slack_integration_assigned | bool

    - name: Download pinned slack-mcp-server binary (darwin)
      ansible.builtin.get_url:
        url: "https://github.com/korotovsky/slack-mcp-server/releases/download/{{ mcp_slack_version }}/slack-mcp-server-{{ mcp_slack_arch_map[ansible_architecture] }}"
        dest: "/Users/{{ agent_name }}/.local/bin/slack-mcp-server"
        checksum: "sha256:{{ mcp_slack_sha256_map[ansible_architecture] }}"
        validate_certs: yes
        owner: "{{ agent_name }}"
        group: staff
        mode: '0755'
      become: true
      when:
        - slack_integration_assigned | bool

    # launchd restart is NOT triggered from inside this playbook. The
    # orchestrator (core/lifecycle.configure_agent followed by
    # restart_agent) calls into core/lifecycle_macos.restart_agent_macos
    # after this playbook returns. Keeping the restart out of the
    # playbook avoids duplicating the dispatcher logic in YAML.
    - name: Display configure success
      ansible.builtin.debug:
        msg: |
          Configuration written to /Users/{{ agent_name }}/.hermes/.
          Next: `clawctl agent start {{ agent_name }}` (or restart).
