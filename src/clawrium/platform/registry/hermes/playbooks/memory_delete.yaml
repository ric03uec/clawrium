---
# Hermes memory delete — targets ~/.hermes/memories/<filename>. Restricted
# to MEMORY.md and USER.md (the two files hermes writes to memories/).
#
# Asymmetry note: memory_write.yaml also accepts SOUL.md, but SOUL.md lives
# at ~/.hermes/SOUL.md (the agent root), NOT inside memories/. memory_delete
# only enumerates files under memories/, so SOUL.md is deliberately not in
# the delete allowlist — deleting an agent's SOUL.md is treated as
# destructive enough to require manual SSH intervention rather than
# routing through `clawctl agent memory delete`.
- hosts: all
  become: yes
  gather_facts: false
  tasks:
    - name: Validate agent_name (defense-in-depth)
      ansible.builtin.fail:
        msg: "Invalid agent_name"
      when:
        - agent_name is not match('^[a-z][a-z0-9_-]{0,31}$')

    - name: Validate memory filenames pattern
      ansible.builtin.fail:
        msg: "Invalid memory filename"
      loop: "{{ memory_files }}"
      when:
        - item is not match('^[A-Za-z0-9._-]+(/[A-Za-z0-9._-]+)?$')

    - name: Reject path-traversal components in filenames
      ansible.builtin.fail:
        msg: "Invalid memory filename: traversal components not allowed"
      loop: "{{ memory_files }}"
      when:
        - item.split('/') | intersect(['', '.', '..']) | length > 0

    - name: Restrict to hermes memory allowlist
      ansible.builtin.fail:
        msg: "hermes memory accepts only MEMORY.md and USER.md"
      loop: "{{ memory_files }}"
      when:
        - item not in ['MEMORY.md', 'USER.md']

    - name: Delete memory files
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.hermes/memories/{{ item }}"
        state: absent
      loop: "{{ memory_files }}"
      no_log: true
