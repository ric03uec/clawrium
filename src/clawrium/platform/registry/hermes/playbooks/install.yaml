---
- hosts: all
  become: yes
  tasks:
    - name: Normalize target Hermes version (strip leading 'v')
      ansible.builtin.set_fact:
        hermes_target_version: "{{ (claw_version | default('v2026.5.7')) | regex_replace('^v', '') }}"

    - name: Resolve Hermes git tag for installer (always 'v'-prefixed)
      ansible.builtin.set_fact:
        hermes_target_branch: "v{{ hermes_target_version }}"

    # Use /usr/sbin/nologin since the agent user is a service account: it
    # runs `hermes gateway run` under systemd and is not meant for interactive
    # login. Reduces lateral-movement attack surface if the account is ever
    # compromised. The hermes installer is invoked via `become_user` + ansible,
    # not via an interactive shell, so this does not affect installation.
    - name: Create agent user
      ansible.builtin.user:
        name: "{{ agent_name }}"
        state: present
        create_home: yes
        shell: /usr/sbin/nologin

    # Hermes upstream installer requires `rg` and `ffmpeg` on PATH. Install
    # them via apt before invoking the installer rather than failing with a
    # manual-remediation message. The play already runs `become: yes`, so no
    # extra escalation is needed. `cache_valid_time` avoids hammering apt
    # mirrors when the cache is recent.
    - name: Install hermes system dependencies (ripgrep, ffmpeg)
      ansible.builtin.apt:
        name:
          - ripgrep
          - ffmpeg
        state: present
        update_cache: yes
        cache_valid_time: 3600

    # Version-aware skip: re-running install on a host that already has the
    # target version is a no-op for the binary install step. `--force` (via
    # the `force_install` extra var) overrides this.
    - name: Discover hermes binary at agent's user-local install path
      ansible.builtin.stat:
        path: "/home/{{ agent_name }}/.local/bin/hermes"
      register: hermes_binary_stat

    - name: Get installed hermes version
      ansible.builtin.command: "/home/{{ agent_name }}/.local/bin/hermes --version"
      register: hermes_version_check
      changed_when: false
      failed_when: false
      become_user: "{{ agent_name }}"
      when: hermes_binary_stat.stat.exists

    # Defensive parse: empty string on no-match means a version check failure
    # is treated as "version unknown" -> not a match -> reinstall (safe default).
    #
    # `hermes --version` prints
    #   Hermes Agent v0.13.0 (2026.5.7)
    # The first triple is the python package version (changes rarely); the
    # parenthesised triple is the upstream release tag we pinned in the
    # manifest. Match against the parenthesised tag to align with manifest.
    - name: Parse installed hermes version
      ansible.builtin.set_fact:
        hermes_installed_version: "{{ ((hermes_version_check.stdout | default('')) | regex_search('\\(([0-9]+\\.[0-9]+\\.[0-9]+)\\)', '\\1') | default([''], true) | first) | default('', true) }}"
      when:
        - hermes_version_check is defined
        - (hermes_version_check.rc | default(1)) == 0

    - name: Set install skip condition
      ansible.builtin.set_fact:
        hermes_already_installed: >-
          {{ hermes_binary_stat.stat.exists
             and (hermes_installed_version | default('')) == hermes_target_version
             and not (force_install | default(false) | bool) }}

    - name: Mark install as skipped when already installed
      ansible.builtin.debug:
        msg: "Hermes v{{ hermes_installed_version | default('unknown') }} already installed at /home/{{ agent_name }}/.local/bin/hermes. Skipping binary install."
      when: hermes_already_installed

    - name: Note that --force was supplied (overriding skip)
      ansible.builtin.debug:
        msg: "force=true: reinstalling Hermes at /home/{{ agent_name }}/.local/bin/hermes"
      when:
        - hermes_binary_stat.stat.exists
        - force_install | default(false) | bool

    # When --force is supplied, remove the binary so the installer's `creates:`
    # short-circuit doesn't keep us from actually re-running the installer.
    - name: Remove existing Hermes binary symlink (forced reinstall)
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.local/bin/hermes"
        state: absent
      when:
        - force_install | default(false) | bool
        - hermes_binary_stat.stat.exists

    - name: Download Hermes installer script
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/NousResearch/hermes-agent/{{ hermes_target_branch }}/scripts/install.sh"
        dest: "/home/{{ agent_name }}/hermes-install.sh"
        mode: "0700"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        force: yes
        timeout: 30
        checksum: "sha256:{{ claw_sha256 }}"
      when: not hermes_already_installed

    # The hermes installer can run for 10+ minutes (git clone, uv venv, large
    # pip dependency tree). We run it async with polling so the SSH connection
    # is reused per-poll rather than held open for the entire install — this
    # avoids `Shared connection ... closed` failures on slow network paths.
    - name: Install Hermes runtime (non-interactive)
      ansible.builtin.command:
        argv:
          - /bin/bash
          - "/home/{{ agent_name }}/hermes-install.sh"
          - --skip-setup
          - --branch
          - "{{ hermes_target_branch }}"
          - --hermes-home
          - "/home/{{ agent_name }}/.hermes"
          - --dir
          - "/home/{{ agent_name }}/.hermes/code"
        creates: "/home/{{ agent_name }}/.local/bin/hermes"
      become_user: "{{ agent_name }}"
      async: 1800
      poll: 30
      when: not hermes_already_installed

    - name: Clean up installer script
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/hermes-install.sh"
        state: absent
      when: not hermes_already_installed

    - name: Create Hermes config directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.hermes"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    # `force: no` so a second install (or the hermes upstream installer)
    # does not get its `.env` clobbered. Phase 2 owns the `.env` content.
    # `mode: "0600"` is set ON the create task itself (not via a separate
    # chmod) so the file is never world-readable, even momentarily, when
    # ansible.builtin.copy creates it. This closes a TOCTOU window where
    # the file would briefly exist at 0644 between create and chmod tasks.
    - name: Create empty Hermes environment file (preserved across re-installs)
      ansible.builtin.copy:
        dest: "/home/{{ agent_name }}/.hermes/.env"
        content: ""
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: no

    # The hermes upstream installer writes its own template `.env` with mode
    # 0644. Tighten permissions unconditionally so any provider keys placed
    # there in Phase 2 are not world-readable. This is a backstop for the
    # case where the upstream installer already created the file at 0644
    # before our `copy` (with `force: no`) ran.
    - name: Enforce 0600 permissions on Hermes environment file
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.hermes/.env"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        state: file

    - name: Create Hermes memories directory
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.hermes/memories"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    # Issue #478 phase 2: native dashboard support.
    #
    # The upstream `hermes` CLI at /home/<agent>/.local/bin/hermes is a
    # thin BASH wrapper (verified on a live install), not a python script
    # — it `exec`s the venv entry point at .hermes/code/venv/bin/hermes.
    # Parsing its shebang yields `/usr/bin/env` or `bash`, neither of
    # which can be invoked as `-m pip`.
    #
    # The hermes upstream installer pins the venv path via
    # `--dir /home/<agent>/.hermes/code`, so the interpreter lives at a
    # stable, predictable location regardless of uv's internal layout
    # choices. Resolve it directly + stat to fail loudly if missing.
    - name: Resolve hermes venv python interpreter
      ansible.builtin.set_fact:
        hermes_interpreter: "/home/{{ agent_name }}/.hermes/code/venv/bin/python3"

    - name: Verify hermes venv interpreter exists
      ansible.builtin.stat:
        path: "{{ hermes_interpreter }}"
      register: hermes_interpreter_stat

    - name: Fail if hermes venv interpreter missing
      ansible.builtin.fail:
        msg: >-
          Hermes venv python not found at {{ hermes_interpreter }}.
          The upstream hermes installer should have created it.
          Re-run with --force, or inspect the venv manually.
      when: not hermes_interpreter_stat.stat.exists

    # Install the [web,pty] extras EDITABLE from the source checkout
    # the upstream installer cloned at /home/<agent>/.hermes/code.
    #
    # Why editable (not a PyPI install of hermes-agent[web,pty]):
    # hermes_cli resolves `PROJECT_ROOT = Path(__file__).parent.parent`
    # to locate source-tree-resident resources (ui-tui/, web/,
    # scripts/, pyproject.toml). With a non-editable install
    # `__file__` lives in site-packages and PROJECT_ROOT misses the
    # source tree — the dashboard's chat-sidebar /pty_ws endpoint then
    # crashes with FileNotFoundError on `<site-packages>/ui-tui`.
    # Editable installs leave the code in the source checkout and
    # point Python at it via a `.pth` file, so PROJECT_ROOT correctly
    # resolves to /home/<agent>/.hermes/code.
    #
    # Why `uv pip` (not `python -m pip`): the upstream installer
    # builds the venv with uv, which doesn't ship pip inside the
    # venv. uv is on the agent user's PATH (the upstream installer
    # guarantees it). `--python` targets the venv directly.
    #
    # Why no `--upgrade`: `--editable` is the operation we want
    # (re-point to source). The upstream installer already ran
    # `uv pip install -e ".[all]"` so this task is idempotent — extras
    # are additive in pip; specifying just [web,pty] doesn't remove
    # other extras already installed.
    - name: Install hermes-agent[web,pty] extras (editable from source)
      ansible.builtin.command:
        argv:
          - uv
          - pip
          - install
          - --python
          - "{{ hermes_interpreter }}"
          - --editable
          - "/home/{{ agent_name }}/.hermes/code[web,pty]"
      become_user: "{{ agent_name }}"
      register: hermes_extras_install
      changed_when: "'Successfully installed' in (hermes_extras_install.stdout | default(''))"

    # Node >= 18 is required for the dashboard SPA to build on first launch.
    # `command -v node` succeeds even on broken installs; we additionally
    # parse the major version. Surface a remediation message rather than the
    # raw shell error so the operator knows exactly what to do.
    - name: Verify Node.js >= 18 is present
      ansible.builtin.shell: |
        set -euo pipefail
        if ! command -v node >/dev/null 2>&1; then
          echo "missing"
          exit 0
        fi
        node --version | sed -e 's/^v//' -e 's/\..*//'
      args:
        executable: /bin/bash
      register: node_version_major
      changed_when: false
      failed_when: false

    - name: Fail if Node.js missing or older than v18
      ansible.builtin.fail:
        msg: >-
          The hermes dashboard requires Node.js >= 18 on the agent host.
          Detected: '{{ node_version_major.stdout | default('missing') }}'.
          Install with: `sudo apt install -y nodejs npm` (or use nodesource
          for a newer release).
      when: >-
        (node_version_major.stdout | default('missing')) == 'missing'
        or not ((node_version_major.stdout | default('0')) is match('^[0-9]+$'))
        or (node_version_major.stdout | default('0') | int) < 18

    # Issue #490 — Pre-build the TUI bundle + work around two upstream
    # NousResearch/hermes-agent v2026.5.7 defects.
    #
    # Defect A (filename drift): `ui-tui/packages/hermes-ink/package.json`'s
    # `build` script writes `dist/entry-exports.js`, but
    # `hermes_cli/main.py:_hermes_ink_bundle_stale` checks for
    # `dist/ink-bundle.js`. The expected file is never produced, so the
    # staleness check is permanently True, which propagates through
    # `_tui_build_needed` and forces a rebuild on every dashboard chat
    # request.
    #
    # Defect B (blocking subprocess in async handler):
    # `web_server.py:pty_ws` calls `_resolve_chat_argv` (→ `_make_tui_argv`,
    # → `subprocess.run([npm, "run", "build"], ...)`) synchronously between
    # `await ws.accept()` and the PTY spawn. With defect A active, every
    # chat WS upgrade triggers a multi-second blocking build that prevents
    # uvicorn from flushing the queued HTTP 101 to the client — browsers
    # see the handshake fail.
    #
    # Mitigation here:
    #   (1) Run `npm install + npm run build` at install time so the
    #       runtime never needs to.
    #   (2) Copy `entry-exports.js` → `ink-bundle.js` so the staleness
    #       check finds the file it's looking for.
    #   (3) Touch `ink-bundle.js` (fresh mtime, defeats
    #       `_hermes_ink_bundle_stale`) and `dist/entry.js` (fresh mtime
    #       newer than all `.ts/.tsx` + meta files, defeats
    #       `_tui_build_needed`).
    #
    # Retire this block once upstream lands fixes for both defects (track
    # via issue #490).
    - name: Install ui-tui Node dependencies (idempotent)
      ansible.builtin.command:
        cmd: npm install --silent --no-fund --no-audit --no-progress
        chdir: "/home/{{ agent_name }}/.hermes/code/ui-tui"
      become_user: "{{ agent_name }}"
      environment:
        CI: "1"
      register: hermes_ui_tui_npm_install
      changed_when: false
      failed_when: hermes_ui_tui_npm_install.rc != 0

    - name: Pre-build ui-tui bundle (avoid lazy build in /api/pty handler)
      ansible.builtin.command:
        cmd: npm run build
        chdir: "/home/{{ agent_name }}/.hermes/code/ui-tui"
      become_user: "{{ agent_name }}"
      register: hermes_ui_tui_build
      changed_when: "'esbuild' in (hermes_ui_tui_build.stdout | default(''))"
      failed_when: hermes_ui_tui_build.rc != 0

    - name: Alias entry-exports.js to ink-bundle.js (upstream filename drift workaround)
      ansible.builtin.copy:
        src: "/home/{{ agent_name }}/.hermes/code/ui-tui/packages/hermes-ink/dist/entry-exports.js"
        dest: "/home/{{ agent_name }}/.hermes/code/ui-tui/packages/hermes-ink/dist/ink-bundle.js"
        remote_src: true
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0644"

    - name: Touch ink-bundle.js so _hermes_ink_bundle_stale sees a fresh mtime
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.hermes/code/ui-tui/packages/hermes-ink/dist/ink-bundle.js"
        state: touch
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0644"
      changed_when: false

    - name: Touch ui-tui/dist/entry.js so _tui_build_needed sees a fresh mtime
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.hermes/code/ui-tui/dist/entry.js"
        state: touch
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0755"
      changed_when: false

    # Service is dropped DISABLED and NOT started. Phase 2 (configure) writes
    # provider credentials to .env and turns the unit on. Calling
    # `clm agent start` before configure will start the unit, but hermes will
    # exit immediately because no provider is configured — documented in the
    # plan as expected behavior.
    #
    # `Also=` lives on the GATEWAY unit (this one), not the dashboard unit:
    # systemd's `Also=` is symmetric on enable/disable, so the directive
    # belongs on the unit whose lifecycle should pull the dependent. Enabling
    # the gateway → enables the dashboard companion. Disabling the gateway
    # → disables the dashboard. The reverse (disabling the dashboard alone)
    # MUST NOT take the gateway down with it — that's why `Also=` is here
    # and not on the dashboard side (ATX W1).
    - name: Create systemd service file (disabled, not started)
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
        content: |
          [Unit]
          Description=Hermes AI Agent ({{ agent_name }})
          After=network.target

          [Service]
          Type=simple
          User={{ agent_name }}
          WorkingDirectory=/home/{{ agent_name }}/.hermes
          EnvironmentFile=/home/{{ agent_name }}/.hermes/.env
          # PATH includes ~/.local/bin so subprocesses spawned by the gateway
          # (notably the kanban dispatcher's `subprocess.run(["hermes", ...])`
          # bare-name lookup) can resolve the hermes CLI without venv activation.
          # Placed AFTER EnvironmentFile= so the unit-file value always wins
          # over any PATH= an operator might add to .hermes/.env.
          Environment=PATH=/home/{{ agent_name }}/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          ExecStart=/home/{{ agent_name }}/.local/bin/hermes gateway run
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          Also={{ agent_type }}-dashboard-{{ agent_name }}.service
        mode: "0644"
      no_log: true
      notify: Reload systemd

    # Companion dashboard unit. `PartOf=` makes systemd propagate stop/restart
    # from the gateway unit to this one automatically. The gateway unit's
    # `Also=` (above) is the symmetric enable/disable hook. ExecStart binds
    # to loopback only — the SSH tunnel is the authentication boundary.
    - name: Create dashboard systemd service file (disabled, not started)
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ agent_type }}-dashboard-{{ agent_name }}.service"
        content: |
          [Unit]
          Description=Hermes Dashboard ({{ agent_name }})
          After=network.target
          PartOf={{ agent_type }}-{{ agent_name }}.service

          [Service]
          Type=simple
          User={{ agent_name }}
          WorkingDirectory=/home/{{ agent_name }}/.hermes
          EnvironmentFile=/home/{{ agent_name }}/.hermes/.env
          Environment=HERMES_DASHBOARD_TUI=1
          ExecStart=/home/{{ agent_name }}/.local/bin/hermes dashboard --host 127.0.0.1 --port {{ dashboard_port }} --no-open --tui
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      no_log: true
      notify: Reload systemd

    # ATX W6: eager daemon-reload removed. The two unit-file copy tasks
    # above notify the `Reload systemd` handler; a flush_handlers ensures
    # the reload runs before the success message (and any future tasks
    # below) without firing twice when nothing changed.
    - name: Flush handlers to apply systemd daemon-reload
      ansible.builtin.meta: flush_handlers

    - name: Display install success
      ansible.builtin.debug:
        msg: |
          Hermes {{ hermes_target_version }} installed for agent '{{ agent_name }}'.
          Service unit hermes-{{ agent_name }}.service dropped (disabled, stopped).
          Run `clm agent configure {{ agent_name }}` to provision a provider and start the gateway.

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes
