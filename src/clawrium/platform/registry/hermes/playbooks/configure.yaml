---
- hosts: all
  become: yes
  vars:
    # Pinned versions for the Atlassian MCP integration toolchain.
    # Bump these deliberately after verifying the new release's env-var
    # interface; both are exercised on every `clm agent configure`.
    mcp_atlassian_version: "0.21.1"
    uv_version: "0.5.20"
    # Per-arch uv release assets + sha256 sums. Pinned together with
    # uv_version — when bumping, fetch new hashes from:
    #   https://github.com/astral-sh/uv/releases/download/<uv_version>/uv-<triple>.tar.gz.sha256
    # and replace the corresponding map entry. Unmapped ansible_architecture
    # values fail fast below.
    uv_arch_map:
      x86_64: "x86_64-unknown-linux-gnu"
      aarch64: "aarch64-unknown-linux-gnu"
      armv7l: "armv7-unknown-linux-gnueabihf"
    uv_sha256_map:
      x86_64: "8fdbfca767917f957e4541747cbf7b23b45c211109dbba97b49962fa3547aab4"
      aarch64: "3d2281312d047288ecb021f4c761cd351f993514e3ea7f369354701b3a44c756"
      armv7l: "769c07de286d607d0e13e9e83051a5ac0cfe1c34695ece976934345e09e97f4b"
    # Precomputed convenience flag — true iff this run has at least one
    # atlassian integration assigned. Avoids repeating the dict2items filter
    # chain on every `when:` clause below.
    atlassian_integration_assigned: >-
      {{
        integrations is defined
        and (integrations | dict2items
              | selectattr('value.type', 'equalto', 'atlassian')
              | list | length > 0)
      }}
  tasks:
    - name: Check if agent user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ agent_name }}"
      failed_when: false
      register: user_check

    - name: Fail if hermes not installed
      ansible.builtin.fail:
        msg: "Agent user '{{ agent_name }}' not found. Run 'clm agent install --type hermes ...' first."
      when: user_check.msg is defined

    - name: Verify API_SERVER_KEY is present in config
      ansible.builtin.fail:
        msg: |
          api_server.key is missing for agent '{{ agent_name }}'.
          Re-run 'clm agent install --type hermes --host <h> --name {{ agent_name }}' to regenerate.
      when: config.api_server is not defined or not config.api_server.key

    - name: Ensure ~/.hermes config directory exists
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.hermes"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0700"

    # Re-render the systemd unit to use `hermes gateway run` (foreground,
    # supervisor-friendly) instead of `hermes gateway start` (which delegates
    # to a pre-installed per-user systemd unit and exits 1 if that unit isn't
    # there — see `hermes gateway --help`). Phase 1's install.yaml dropped the
    # initial unit; configure.yaml owns the runtime ExecStart.
    - name: Sync hermes systemd unit (Phase 2 ExecStart)
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ agent_type }}-{{ agent_name }}.service"
        content: |
          [Unit]
          Description=Hermes AI Agent ({{ agent_name }})
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ agent_name }}
          WorkingDirectory=/home/{{ agent_name }}/.hermes
          EnvironmentFile=/home/{{ agent_name }}/.hermes/.env
          ExecStart=/home/{{ agent_name }}/.local/bin/hermes gateway run
          StandardOutput=journal
          StandardError=journal
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: "0644"
      notify: Restart hermes service

    # Render ~/.hermes/.env (provider API key + API_SERVER_* + low-priority
    # provider/model env-var fallback). force: yes overwrites the populated
    # template .env that hermes' upstream installer drops.
    - name: Render ~/.hermes/.env from template
      ansible.builtin.template:
        src: "{{ template_path }}/.env.j2"
        dest: "/home/{{ agent_name }}/.hermes/.env"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart hermes service

    # Render ~/.hermes/config.yaml (model.provider, model.default,
    # model.base_url). Hermes deep-merges with DEFAULT_CONFIG so omitted
    # top-level keys keep their hermes defaults. no_log because mcp_servers
    # entries now contain the Atlassian API token verbatim.
    - name: Render ~/.hermes/config.yaml from template
      ansible.builtin.template:
        src: "{{ template_path }}/config.yaml.j2"
        dest: "/home/{{ agent_name }}/.hermes/config.yaml"
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "0600"
        force: yes
      no_log: true
      notify: Restart hermes service

    # GitHub CLI authentication — runs `gh auth login --with-token` as the
    # agent user for each assigned github integration. `gh` is a soft
    # dependency: if it isn't installed, the env var path (GITHUB_TOKEN in
    # .env above) still wires the token so skills calling the GitHub REST
    # API directly continue to work.
    #
    # The `which gh` probe uses failed_when:false + a `when` guard on
    # `gh_check.rc == 0` so absence of gh short-circuits the loop without
    # failing the play. We pass the bare command `gh` (not `gh_check.stdout`)
    # to the auth task: Ansible's own PATH resolution at exec time is the
    # established pattern for system binaries and avoids inheriting any
    # quoting / multi-line edge cases from the probe's stdout.
    # `changed_when: false` keeps the task idempotent — re-running configure
    # against a host that's already authenticated reports `ok`, not `changed`.
    - name: GitHub CLI authentication block
      when: integrations is defined
      block:
        - name: Check if gh CLI is installed
          ansible.builtin.command: which gh
          register: gh_check
          changed_when: false
          failed_when: false

        - name: Authenticate gh CLI for each github integration
          ansible.builtin.command:
            argv:
              - gh
              - auth
              - login
              - --with-token
            stdin: "{{ item.value.GITHUB_TOKEN }}"
          become: yes
          become_user: "{{ agent_name }}"
          no_log: true
          changed_when: false
          when:
            - gh_check.rc == 0
            - item.value.type == 'github'
            - item.value.GITHUB_TOKEN is defined
          loop: "{{ integrations | dict2items }}"
          loop_control:
            label: "{{ item.key }}"

    # Per-provider credential verification — uses `grep -q` so we get a clean
    # zero/non-zero exit status without leaking the rendered key into logs.
    - name: Verify .env credentials for OpenRouter provider
      ansible.builtin.command:
        cmd: grep -q '^OPENROUTER_API_KEY=' "/home/{{ agent_name }}/.hermes/.env"
      register: openrouter_check
      changed_when: false
      failed_when: openrouter_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'openrouter'
        - provider_api_key | default('') | length > 0

    - name: Verify .env credentials for Anthropic provider
      ansible.builtin.command:
        cmd: grep -q '^ANTHROPIC_API_KEY=' "/home/{{ agent_name }}/.hermes/.env"
      register: anthropic_check
      changed_when: false
      failed_when: anthropic_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'anthropic'
        - provider_api_key | default('') | length > 0

    - name: Verify .env credentials for OpenAI provider
      ansible.builtin.command:
        cmd: grep -q '^OPENAI_API_KEY=' "/home/{{ agent_name }}/.hermes/.env"
      register: openai_check
      changed_when: false
      failed_when: openai_check.rc != 0
      no_log: true
      when:
        - config.provider is defined
        - config.provider.type == 'openai'
        - provider_api_key | default('') | length > 0

    # Ollama / custom OpenAI-compatible endpoint: no API key, but the
    # config.yaml must declare model.provider: custom and model.base_url.
    - name: Verify config.yaml declares custom provider for Ollama
      ansible.builtin.command:
        cmd: grep -qE '^\s*provider:\s*"custom"' "/home/{{ agent_name }}/.hermes/config.yaml"
      register: custom_provider_check
      changed_when: false
      failed_when: custom_provider_check.rc != 0
      when:
        - config.provider is defined
        - config.provider.type == 'ollama'

    - name: Verify config.yaml declares base_url for Ollama provider
      ansible.builtin.command:
        cmd: grep -qE '^\s*base_url:\s+' "/home/{{ agent_name }}/.hermes/config.yaml"
      register: base_url_check
      changed_when: false
      failed_when: base_url_check.rc != 0
      when:
        - config.provider is defined
        - config.provider.type == 'ollama'

    # Verify the API_SERVER block always renders, regardless of provider.
    # Use grep -q rather than lineinfile check_mode because the latter reports
    # `changed: true` whenever the matched line differs from the placeholder
    # (i.e., always — the real key never equals our placeholder).
    - name: Verify .env contains API_SERVER_KEY
      ansible.builtin.command:
        cmd: grep -q '^API_SERVER_KEY=' "/home/{{ agent_name }}/.hermes/.env"
      register: api_server_key_check
      changed_when: false
      failed_when: api_server_key_check.rc != 0
      no_log: true

    # Discord platform verification — only runs when channels.discord.enabled
    # is true. Confirms the bot token landed in .env and the allowlist guard
    # (at least one of DISCORD_ALLOWED_USERS / DISCORD_ALLOW_ALL_USERS) is
    # present, since hermes denies every message without one of those.
    - name: Verify .env contains DISCORD_BOT_TOKEN when Discord enabled
      ansible.builtin.command:
        cmd: grep -q '^DISCORD_BOT_TOKEN=' "/home/{{ agent_name }}/.hermes/.env"
      register: discord_token_check
      changed_when: false
      failed_when: discord_token_check.rc != 0
      no_log: true
      when:
        - config.channels is defined
        - config.channels.discord is defined
        - config.channels.discord.enabled | default(false)

    - name: Verify .env declares Discord user allowlist when Discord enabled
      ansible.builtin.command:
        cmd: grep -qE "^(DISCORD_ALLOWED_USERS=.+|DISCORD_ALLOW_ALL_USERS=true)" "/home/{{ agent_name }}/.hermes/.env"
      register: discord_allowlist_check
      changed_when: false
      failed_when: discord_allowlist_check.rc != 0
      no_log: true
      when:
        - config.channels is defined
        - config.channels.discord is defined
        - config.channels.discord.enabled | default(false)

    # MCP toolchain bootstrap — only runs when an atlassian integration is
    # assigned, so non-MCP agents pay zero overhead.
    #
    # Install uv via standalone binary. Why not pip: Ubuntu 24.04+ enforces
    # PEP 668 ("externally-managed-environment") which blocks `pip install
    # --user`. Standalone binary from astral-sh/uv releases avoids pip
    # entirely, respects PEP 668, and keeps the toolchain pinned and
    # checksum-verified. Both `uv` and `uvx` are extracted; the MCP server
    # invocation in config.yaml.j2 uses `uvx`.
    - name: Fail early if host architecture is unsupported by the uv arch map
      ansible.builtin.fail:
        msg: >-
          uv install: ansible_architecture='{{ ansible_architecture }}' is not
          mapped to a uv release asset. Supported: {{ uv_arch_map.keys() | list | join(', ') }}.
          Add the triple + sha256 to uv_arch_map / uv_sha256_map in this playbook
          (see https://github.com/astral-sh/uv/releases/tag/{{ uv_version }}).
      when:
        - atlassian_integration_assigned | bool
        - ansible_architecture not in uv_arch_map

    - name: Ensure ~/.local/bin and ~/.hermes/tmp exist for agent user
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ agent_name }}"
        group: "{{ agent_name }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/home/{{ agent_name }}/.local/bin", mode: '0755' }
        - { path: "/home/{{ agent_name }}/.hermes/tmp", mode: '0700' }
      become: true
      when:
        - atlassian_integration_assigned | bool

    # Stage the tarball under an agent-owned mode-0700 dir to avoid the
    # symlink-race surface of a predictable /tmp path. Checksum + explicit
    # validate_certs gate against MITM / tampered release-asset risk.
    - name: Download pinned uv binary for agent user
      ansible.builtin.get_url:
        url: "https://github.com/astral-sh/uv/releases/download/{{ uv_version }}/uv-{{ uv_arch_map[ansible_architecture] }}.tar.gz"
        dest: "/home/{{ agent_name }}/.hermes/tmp/uv-{{ uv_version }}.tar.gz"
        checksum: "sha256:{{ uv_sha256_map[ansible_architecture] }}"
        validate_certs: yes
        mode: '0600'
      become: true
      become_user: "{{ agent_name }}"
      when:
        - atlassian_integration_assigned | bool

    # Version-aware install gate — skip unarchive when the installed uv
    # already matches uv_version. Avoids the `creates:` antipattern (would
    # silently skip on a version bump because the binary path is not
    # version-stamped, leaving a stale binary in place). Same rationale as
    # the `--force` flag on the mcp-atlassian install below.
    - name: Probe installed uv version (if any)
      ansible.builtin.command: "/home/{{ agent_name }}/.local/bin/uv --version"
      register: uv_installed_check
      changed_when: false
      failed_when: false
      become: true
      become_user: "{{ agent_name }}"
      when:
        - atlassian_integration_assigned | bool

    # `uv --version` prints e.g. `uv 0.5.20 (xyz 2024-12-19)`; substring
    # match against uv_version is sufficient and avoids brittle parsing.
    - name: Determine whether uv needs install/upgrade
      ansible.builtin.set_fact:
        uv_needs_install: >-
          {{
            (uv_installed_check.rc | default(1)) != 0
            or uv_version not in (uv_installed_check.stdout | default(''))
          }}
      when:
        - atlassian_integration_assigned | bool

    # No `--wildcards` filter — both `uv` and `uvx` need to land, since
    # config.yaml.j2's mcp_servers entry invokes uvx.
    - name: Extract uv and uvx binaries to ~/.local/bin/
      ansible.builtin.unarchive:
        src: "/home/{{ agent_name }}/.hermes/tmp/uv-{{ uv_version }}.tar.gz"
        dest: "/home/{{ agent_name }}/.local/bin/"
        remote_src: yes
        extra_opts:
          - --strip-components=1
      become: true
      become_user: "{{ agent_name }}"
      when:
        - atlassian_integration_assigned | bool
        - uv_needs_install | default(true) | bool

    - name: Ensure uv and uvx binaries are executable
      ansible.builtin.file:
        path: "/home/{{ agent_name }}/.local/bin/{{ item }}"
        mode: '0755'
      become: true
      become_user: "{{ agent_name }}"
      loop:
        - uv
        - uvx
      when:
        - atlassian_integration_assigned | bool

    - name: Assert uv and uvx binaries are present
      ansible.builtin.stat:
        path: "/home/{{ agent_name }}/.local/bin/{{ item }}"
      loop:
        - uv
        - uvx
      register: uv_binary_stat
      when:
        - atlassian_integration_assigned | bool

    - name: Fail with clear message if uv install did not land the binaries
      ansible.builtin.fail:
        msg: >-
          uv installation failed for agent '{{ agent_name }}': expected
          /home/{{ agent_name }}/.local/bin/uv and /uvx to exist after
          extracting the uv {{ uv_version }} standalone binary from GitHub
          releases. Verify outbound access to github.com from the agent host
          and re-run `clm agent configure {{ agent_name }}`.
      when:
        - atlassian_integration_assigned | bool
        - uv_binary_stat.results is defined
        - uv_binary_stat.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

    # Install MCP server packages for assigned integrations. `uv tool install
    # --force` is idempotent when the version matches and surfaces actual
    # upgrades when the pin moves — preferable to a `creates:` guard pointing
    # at a non-version-stamped venv path (which would silently skip the task
    # on version bumps).
    - name: Pre-install mcp-atlassian (pinned, force-idempotent)
      ansible.builtin.command:
        cmd: "/home/{{ agent_name }}/.local/bin/uv tool install --force mcp-atlassian=={{ mcp_atlassian_version }}"
      become: true
      become_user: "{{ agent_name }}"
      register: mcp_atlassian_install
      changed_when: "'Installed' in (mcp_atlassian_install.stdout | default(''))"
      no_log: true
      when:
        - atlassian_integration_assigned | bool

    # Force the restart handler to fire NOW so probes below run against the
    # newly-rendered config.
    - name: Apply pending restart before probing
      ansible.builtin.meta: flush_handlers

    # Wait for the gateway to come up. /health is unauthenticated (verified
    # against gateway/platforms/api_server.py at v2026.5.7), so we don't pass
    # the bearer token here.
    - name: Probe hermes /health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ config.api_server.port | default(8642) | int }}/health"
        method: GET
        status_code: 200
        timeout: 5
      register: health_probe
      retries: 20
      delay: 3
      until: health_probe.status == 200

    - name: Display configure success
      ansible.builtin.debug:
        msg: |
          Hermes agent '{{ agent_name }}' configured for provider '{{ config.provider.type | default('auto') }}'.
          OpenAI-compatible API exposed on all interfaces (0.0.0.0:{{ config.api_server.port | default(8642) | int }}), bearer-token protected (HERMES_API_SERVER_KEY).
          Reachable at http://<host-ip>:{{ config.api_server.port | default(8642) | int }}/v1 from any clm machine on the LAN.
          Service: hermes-{{ agent_name }}.service (active)

  handlers:
    # Single canonical restart handler. Always does daemon_reload so it covers
    # both unit-file changes (from install.yaml) and pure env changes (from
    # the template/config tasks above). All `notify` directives above point at
    # this handler so first-configure restarts the service exactly once.
    - name: Restart hermes service
      ansible.builtin.systemd:
        name: "{{ agent_type }}-{{ agent_name }}"
        state: restarted
        enabled: yes
        daemon_reload: yes
