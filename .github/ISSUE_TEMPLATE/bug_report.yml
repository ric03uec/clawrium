name: Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this bug. Please fill out the sections below to help us understand and fix the issue.

        Before submitting:
        - Search [existing issues](https://github.com/ric03uec/clawrium/issues?q=is%3Aissue+label%3Abug) to avoid duplicates
        - Make sure you're using the latest version

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched existing issues and this hasn't been reported yet
          required: true
        - label: This is a single bug report (separate reports for different bugs)
          required: true
        - label: I am using the latest version of clawrium
          required: true

  - type: textarea
    id: customer-outcome
    attributes:
      label: What should the user be able to do?
      description: Describe what the user should be able to accomplish when this bug is fixed
      placeholder: "User can install zeroclaw without version mismatch errors"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What's happening?
      description: Describe the current broken behavior
      placeholder: |
        When I run `clawctl claw install zeroclaw`, the command fails with a version mismatch error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should happen?
      description: Describe the expected behavior
      placeholder: The claw should install successfully without errors
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide clear steps to reproduce the issue
      placeholder: |
        1. Run `clawctl init`
        2. Run `clawctl host add myhost --ip 192.168.1.10`
        3. Run `clawctl claw install zeroclaw --host myhost`
        4. See error...
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error Messages/Logs
      description: Paste any error output or logs
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Clawrium Version
      description: Output of `clawctl --version`
      placeholder: "26.3.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Any relevant environment information (Python version, shell, etc.)
      placeholder: |
        Python 3.11.5
        bash 5.2.15
        Ubuntu 22.04
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information
    validations:
      required: false
