name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Linux is the primary platform. macOS coverage was added with
    # issue #469 (Mac support); it exercises the dispatcher + Mac-only
    # code paths against an Apple Silicon runner so any drift between
    # the linux + darwin lifecycle backends surfaces in CI rather
    # than on a user's Mac. fail-fast disabled so one platform's
    # failures don't mask the other's.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # v4.2.0 — pinned to SHA. Matches the `version: "0.5.x"` convention
        # used in skills-validate.yml so all CI jobs run against the same
        # uv minor and a `setup-uv` release can't silently change behavior.
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/package-lock.json

      # Stage the frontend BEFORE `uv sync`. The wheel target force-includes
      # `src/clawrium/gui/frontend/`, so `uv sync` (which builds the project
      # in editable mode via hatchling) would otherwise fail with
      # `FileNotFoundError: Forced include not found`. Also unblocks
      # `tests/test_wheel_contents.py` (#401 regression net).
      - name: Build GUI frontend
        run: make build-ui

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: make lint

      # On Ubuntu the full suite runs with coverage. On macOS we run only
      # the Mac-touching tests (resolver, version matcher, hardware
      # normalization, host_macos, launchd plist, lifecycle_macos, and
      # the mocked Mac E2E integration). The rest of the suite contains
      # tests that pre-date #469 and assume a Linux runtime — exercising
      # them on macOS surfaces unrelated, pre-existing failures and
      # adds no signal about the Mac-support change set.
      - name: Run Python tests with coverage (Ubuntu — full suite)
        if: matrix.os == 'ubuntu-latest'
        run: make test-cov

      - name: Run Python tests (macOS — Mac-touching tests only)
        if: matrix.os == 'macos-14'
        run: make test-macos

      - name: Run JS tests
        run: make test-ui

      # Coverage is only collected on Ubuntu (full suite); macOS runs a
      # narrower set without --cov so there's no `.coverage` artifact.
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
