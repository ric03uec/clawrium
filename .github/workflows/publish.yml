name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    # W3 — refuse to publish from pre-release tags
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read  # W5 — explicit instead of implicit

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        # https://github.com/actions/checkout/releases/tag/v4.3.1

      - name: Install uv
        # v4.2.0 — SHA-pinned. The wider OIDC permissions on this job make a
        # mutable major-tag (`@v4`) plus floating uv version (`latest`) doubly
        # unacceptable: a compromised action release or rogue uv could tamper
        # with the build artifact or exfiltrate the OIDC token.
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.11

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        # https://github.com/actions/setup-node/releases/tag/v4.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gui/package-lock.json

      # `make build` runs `build-ui` first so the Next.js export is staged at
      # src/clawrium/gui/frontend/ before `uv build` packages the wheel.
      # Bare `uv build` ships a wheel without the UI and `clm gui` 404s.
      # Running build before `uv sync` is required: the wheel target
      # force-includes the staged frontend, so an editable install via
      # `uv sync` would fail if the frontend isn't staged yet.
      - name: Build package
        run: make build

      # S1 — wheel smoke test: verify the built wheel installs and imports correctly
      - name: Wheel smoke test
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install dist/*.whl
          /tmp/smoke-venv/bin/python -c "import clawrium; print(clawrium.__version__)"

      - name: Install test dependencies
        run: uv sync --frozen

      # W4 — assert pyproject.toml version matches the release tag
      - name: Assert pyproject version matches release tag
        run: |
          PYPROJECT_VER=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG="${{ github.event.release.tag_name }}"
          if [ "v${PYPROJECT_VER}" != "${TAG}" ]; then
            echo "::error::pyproject version v${PYPROJECT_VER} does not match release tag ${TAG}"
            exit 1
          fi

      - name: Lint
        run: make lint

      # Full test suite (Python + JS) — broken UI or backend can't ship.
      - name: Run tests
        run: make test-cov

      - name: Publish to PyPI
        # v1.14.0 — SHA-pinned to the COMMIT SHA the tag points to, NOT
        # the annotated-tag object SHA. GitHub Actions resolves `uses:
        # ...@<sha>` literally to a ghcr.io image tag, and the action's
        # release process publishes images under the commit SHA, not the
        # tag-object SHA. Pinning to a tag-object SHA fails at runtime
        # with `docker: manifest unknown` (see v26.5.2/v26.5.3 publish
        # runs that used `6733eb7d…` and `7f25271a…`, both tag-object SHAs).
        # `@release/v1` is a mutable branch ref; with `id-token: write`
        # in scope, a force-push or compromise of that branch could
        # publish a malicious wheel to PyPI under our identity.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          skip-existing: true
