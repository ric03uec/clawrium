<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Clawrium GUI walkthrough</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: radial-gradient(ellipse at top, #0f1f1a 0%, #050807 70%);
      color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.75rem;
      padding: 4rem;
      box-sizing: border-box;
    }
    .brand {
      font-size: 1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #6ee7b7;
      font-weight: 600;
    }
    h1 {
      font-size: 5.5rem;
      margin: 0;
      color: #ecfdf5;
      letter-spacing: -0.035em;
      line-height: 1.05;
      text-align: center;
      max-width: 22ch;
    }
    p {
      font-size: 1.85rem;
      margin: 0;
      color: #9ca3af;
      max-width: 60ch;
      text-align: center;
      line-height: 1.4;
    }
    .accent {
      width: 4rem;
      height: 3px;
      background: #6ee7b7;
      border-radius: 999px;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="brand">Clawrium</div>
  <h1>Clawrium GUI walkthrough</h1>
  <div class="accent"></div>
  <p>A quick tour of every tab in the dashboard</p>
</body>
</html>
